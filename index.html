<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atlas">
<meta name="theme-color" content="#171209">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Atlas — أطلس</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=El+Messiri:wght@400;500;600&family=Alexandria:wght@500;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
 :root{
   --acc:#B85C38; --ok:#3E7D5C; --warn:#C15B4A; --gold:#C6862F;
   --ink:#241F17; --stone:#7A7160;
   --glass:rgba(253,250,242,.55); --glass2:rgba(253,250,242,.42);
   --gbord:rgba(255,255,255,.68);
   --disp:"Playfair Display",Georgia,serif; --ui:"Hanken Grotesk",-apple-system,sans-serif;
   --ease:cubic-bezier(.32,.72,.24,1);
 }
 .rtl{--disp:"El Messiri","IBM Plex Sans Arabic",sans-serif;--ui:"IBM Plex Sans Arabic",-apple-system,sans-serif}
 *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
 html,body{height:100%}
 body{background:#171209;font-family:"Hanken Grotesk",sans-serif;color:var(--ink);overscroll-behavior:none}
 .phone{width:100%;height:100dvh;overflow:hidden;position:relative;font-family:var(--ui);color:var(--ink)}
 .atmo{position:absolute;inset:0;background:
   radial-gradient(110% 60% at 80% 0%, rgba(248,211,158,.95), rgba(248,211,158,0) 52%),
   radial-gradient(130% 90% at 10% 100%, rgba(103,133,116,.5), rgba(103,133,116,0) 62%),
   linear-gradient(170deg,#F0E4CE 0%,#EBD6B4 32%,#DDBE94 58%,#C0AB8C 80%,#A5A08C 100%)}
 .atmo .dune{position:absolute;left:-10%;right:-10%;height:34%;filter:blur(28px);opacity:.55;border-radius:50%}
 .atmo .d1{bottom:20%;background:#CE9B62}
 .atmo .d2{bottom:2%;background:#7E8E76;height:30%}

 .screen{position:absolute;inset:0;display:none;flex-direction:column}
 .screen.active{display:flex;animation:fade .3s ease}
 @keyframes fade{from{opacity:.55}to{opacity:1}}
 .scroll{flex:1;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,16px) + 118px)}
 .scroll::-webkit-scrollbar{display:none}
 .safetop{height:calc(env(safe-area-inset-top,14px) + 8px);flex-shrink:0}

 .ic{width:20px;height:20px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
 .ic.s{width:15px;height:15px}
 .rtl .flip{transform:scaleX(-1)}
 .glass{background:var(--glass);backdrop-filter:blur(22px);border:1px solid var(--gbord);box-shadow:0 14px 34px rgba(60,44,20,.13), inset 0 1px 0 rgba(255,255,255,.7);border-radius:30px}

 /* header */
 .hd{padding:6px 24px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
 .hd .who small{font-size:11px;color:var(--stone);display:block}
 .hd .who b{font-family:var(--disp);font-weight:500;font-size:19px}
 .rtl .hd .who b{font-size:16px}
 .hd .right{display:flex;gap:8px;align-items:center}
 .langsw{display:flex;background:var(--glass2);backdrop-filter:blur(14px);border:1px solid var(--gbord);border-radius:999px;overflow:hidden;font-size:10px;font-weight:600}
 .langsw div{padding:6px 11px;cursor:pointer;color:var(--stone)}
 .langsw div.on{background:var(--ink);color:#F5EFE2}
 .modechip{display:flex;background:var(--glass2);backdrop-filter:blur(14px);border:1px solid var(--gbord);border-radius:999px;overflow:hidden;font-size:10px;font-weight:700}
 .modechip div{padding:6px 11px;cursor:pointer;color:var(--stone);white-space:nowrap}
 .modechip div.on{background:var(--acc);color:#fff}

 /* ask input */
 .ask{margin:14px 24px 0;height:50px;border-radius:999px;display:flex;align-items:center;gap:11px;padding:0 8px 0 18px;color:var(--stone);font-size:13px;cursor:pointer}
 .rtl .ask{padding:0 18px 0 8px}
 .ask .go{margin-inline-start:auto;width:36px;height:36px;border-radius:50%;background:var(--ink);color:#F5EFE2;display:flex;align-items:center;justify-content:center}

 /* featured story */
 .story{margin:16px 24px 0;border-radius:32px;overflow:hidden;position:relative;height:300px;cursor:pointer;box-shadow:0 18px 44px rgba(60,44,20,.2)}
 .story svg.bg{position:absolute;inset:0;width:100%;height:100%}
 .story .veil{position:absolute;inset:0;background:linear-gradient(rgba(20,14,6,.06) 35%,rgba(20,14,6,.72))}
 .story .body{position:absolute;bottom:0;left:0;right:0;padding:22px;color:#fff}
 .story .kick{font-size:9.5px;font-weight:700;letter-spacing:2.4px;opacity:.85}
 .rtl .story .kick{letter-spacing:0;font-size:11px}
 .story h2{font-family:var(--disp);font-weight:500;font-size:24px;line-height:1.15;margin-top:8px;text-wrap:balance}
 .rtl .story h2{font-size:19px;line-height:1.5}
 .story p{font-size:12px;opacity:.85;margin-top:7px;line-height:1.55}
 .story .cta{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:rgba(253,250,242,.92);color:var(--ink);border-radius:999px;padding:9px 16px;font-size:11.5px;font-weight:700}

 /* serendipity */
 .sere{margin:14px 24px 0;padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer}
 .sere .no{font-family:var(--disp);font-weight:400;font-size:26px;color:var(--gold);white-space:nowrap}
 .rtl .sere .no{font-size:22px}
 .sere b{font-size:13.5px;font-weight:600;display:block}
 .sere small{font-size:11px;color:var(--stone)}
 .sere .dice{margin-inline-start:auto;width:40px;height:40px;border-radius:50%;background:var(--ink);color:#F5EFE2;display:flex;align-items:center;justify-content:center;flex-shrink:0}

 .slabel{padding:24px 28px 12px;font-size:10.5px;font-weight:700;letter-spacing:2.2px;color:var(--stone);display:flex;justify-content:space-between;align-items:baseline}
 .rtl .slabel{letter-spacing:0;font-size:11.5px}
 .slabel a{font-size:11px;color:var(--acc);font-weight:700;cursor:pointer;letter-spacing:.3px}

 /* place tiles */
 .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 24px}
 .pt{padding:9px 9px 4px;border-radius:26px;cursor:pointer;transition:transform .22s var(--ease);position:relative}
 .pt:active{transform:scale(.97)}
 .pt .th{height:86px;border-radius:18px;overflow:hidden;position:relative}
 .pt .th svg{width:100%;height:100%;display:block}
 .pt b{font-family:var(--disp);font-weight:500;font-size:14px;display:block;margin:9px 5px 0;line-height:1.2}
 .rtl .pt b{font-size:12.5px}
 .pt small{font-size:10.5px;color:var(--stone);display:block;margin:3px 5px 9px}
 .pt .st{position:absolute;top:16px;inset-inline-end:16px;width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.9)}
 .st.saved{background:var(--gold)} .st.been{background:var(--ok)} .st.none{background:rgba(255,255,255,.4)}

 /* explore */
 .chips{display:flex;gap:8px;overflow-x:auto;padding:12px 24px}
 .chips::-webkit-scrollbar{display:none}
 .chip{white-space:nowrap;padding:9px 15px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;color:var(--stone);background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--gbord)}
 .chip.on{background:var(--ink);color:#F5EFE2;border-color:var(--ink)}
 .bigt{font-family:var(--disp);font-weight:500;font-size:28px;padding:8px 26px 0}
 .rtl .bigt{font-size:22px}
 .counter{padding:2px 26px 0;font-size:12px;color:var(--stone)}
 .counter b{color:var(--ok);font-weight:700}

 /* detail */
 .dhero{height:250px;position:relative;flex-shrink:0}
 .dhero svg{width:100%;height:100%;display:block}
 .dhero .veil{position:absolute;inset:0;background:linear-gradient(rgba(20,14,6,.14),transparent 35%,transparent 55%,rgba(20,14,6,.62))}
 .dtop{position:absolute;top:calc(env(safe-area-inset-top,14px) + 8px);inset-inline-start:16px;inset-inline-end:16px;display:flex;justify-content:space-between;z-index:5}
 .gbtn{width:40px;height:40px;border-radius:50%;background:rgba(20,14,6,.32);backdrop-filter:blur(12px);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
 .dlock{position:absolute;bottom:18px;inset-inline-start:24px;inset-inline-end:24px;color:#fff;z-index:4}
 .dlock .kick{font-size:9.5px;font-weight:700;letter-spacing:2.4px;opacity:.85;display:block;margin-bottom:8px}
 .rtl .dlock .kick{letter-spacing:0;font-size:11px}
 .dlock h1{font-family:var(--disp);font-weight:500;font-size:30px;line-height:1.08}
 .rtl .dlock h1{font-size:23px;line-height:1.4}
 .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 24px 0}
 .dcell{padding:15px 12px 13px;text-align:center}
 .dcell .cb{display:inline-block;background:rgba(253,250,242,.82);border:1px solid var(--gbord);border-radius:999px;font-size:10px;font-weight:600;padding:3px 11px}
 .dcell .nm{font-family:var(--disp);font-weight:400;font-size:24px;margin-top:8px}
 .rtl .dcell .nm{font-size:19px;font-weight:500}
 .dcell .stt{font-size:10.5px;font-weight:600;margin-top:5px}
 .stok{color:var(--ok)} .stmut{color:var(--stone)}
 .dstory{margin:16px 24px 0;padding:20px 24px;text-align:center}
 .dstory .k{font-size:11.5px;font-weight:500;opacity:.72}
 .dstory p{font-family:var(--disp);font-weight:400;font-size:17px;line-height:1.55;margin-top:8px}
 .rtl .dstory p{font-family:"IBM Plex Sans Arabic",sans-serif;font-size:14px;line-height:1.9}
 .exits{padding:16px 24px 0;display:flex;flex-direction:column;gap:10px}
 .exit{padding:14px 18px;display:flex;align-items:center;gap:13px;cursor:pointer;border-radius:22px}
 .exit .ic{color:var(--acc)}
 .exit b{font-size:13px;font-weight:600;display:block}
 .exit small{font-size:10.5px;color:var(--stone)}
 .exit .chev{margin-inline-start:auto;color:var(--stone)}
 .stickybar{position:absolute;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--gbord);border-radius:24px 24px 0 0;padding:12px 20px calc(env(safe-area-inset-bottom,16px) + 12px);display:flex;gap:9px;z-index:30}
 .sb{flex:1;padding:13px 6px;border-radius:999px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;background:rgba(253,250,242,.8);border:1px solid var(--gbord)}
 .sb.primary{background:var(--ink);color:#F5EFE2;border-color:var(--ink)}
 .sb.saved{background:var(--gold);color:#fff;border-color:var(--gold)}

 /* trip */
 .trip-empty{margin:18px 24px 0;padding:30px 26px;text-align:center}
 .trip-empty p{font-family:var(--disp);font-size:17px;line-height:1.5;color:#4A4438}
 .rtl .trip-empty p{font-size:14.5px;line-height:1.85}
 .trip-empty small{display:block;font-size:11.5px;color:var(--stone);margin-top:9px}
 .trip-empty .cta2{display:inline-block;margin-top:16px;background:var(--ink);color:#F5EFE2;border-radius:999px;padding:12px 22px;font-size:12.5px;font-weight:700;cursor:pointer}
 .plan{margin:14px 24px 0;padding:18px 20px}
 .plan .stop{display:flex;gap:13px}
 .plan .rail{display:flex;flex-direction:column;align-items:center}
 .plan .n{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#F5EFE2;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
 .plan .l{width:2px;flex:1;border-inline-start:2px dotted rgba(120,100,70,.35);min-height:18px}
 .plan .inf{padding-bottom:14px;flex:1;cursor:pointer}
 .plan .inf b{font-size:13.5px;font-weight:600;display:block}
 .plan .inf small{font-size:10.5px;color:var(--stone)}
 .plan .x{color:var(--faint,#B5B0A2);cursor:pointer;font-size:15px;padding:0 4px}
 .routecard{margin:14px 24px 0;padding:18px 20px;cursor:pointer}
 .routecard .tp{display:flex;align-items:baseline;justify-content:space-between}
 .routecard b.nm{font-family:var(--disp);font-weight:500;font-size:17px}
 .rtl .routecard b.nm{font-size:15px}
 .routecard .tag{font-size:9.5px;font-weight:700;border-radius:999px;padding:4px 10px;background:rgba(253,250,242,.85);border:1px solid var(--gbord);color:var(--stone)}
 .routecard .mt{font-size:11px;color:var(--stone);margin-top:4px}
 .routecard .startbtn{margin-top:14px;background:var(--acc);color:#fff;border-radius:999px;padding:12px;text-align:center;font-size:12.5px;font-weight:700}

 /* follow mode */
 #follow{background:#171209}
 #follow .fhero{height:44%;position:relative;flex-shrink:0}
 #follow .fhero svg{width:100%;height:100%;display:block}
 #follow .fhero .veil{position:absolute;inset:0;background:linear-gradient(rgba(20,14,6,.3),transparent 40%,rgba(23,18,9,.95))}
 .fprog{position:absolute;top:calc(env(safe-area-inset-top,14px) + 10px);left:0;right:0;display:flex;justify-content:center;z-index:6}
 .fprog span{background:rgba(20,14,6,.5);backdrop-filter:blur(10px);color:#F5EFE2;font-size:11px;font-weight:700;border-radius:999px;padding:7px 16px}
 .fclose{position:absolute;top:calc(env(safe-area-inset-top,14px) + 6px);inset-inline-end:16px;z-index:6}
 .fbody{flex:1;padding:0 26px;color:#F5EFE2;display:flex;flex-direction:column}
 .fbody .kick{font-size:9.5px;font-weight:700;letter-spacing:2.4px;color:#C9B98A;margin-top:6px}
 .rtl .fbody .kick{letter-spacing:0;font-size:11px}
 .fbody h1{font-family:var(--disp);font-weight:500;font-size:30px;margin-top:6px}
 .rtl .fbody h1{font-size:23px}
 .fbody p{font-size:13.5px;line-height:1.65;color:#CFC5AE;margin-top:10px}
 .rtl .fbody p{font-size:12.5px;line-height:1.85}
 .fbtns{margin-top:auto;padding-bottom:calc(env(safe-area-inset-bottom,16px) + 18px);display:flex;gap:10px}
 .fb{flex:1;padding:15px;border-radius:999px;text-align:center;font-size:13px;font-weight:700;cursor:pointer}
 .fb.arr{background:var(--ok);color:#fff}
 .fb.ghost{background:rgba(253,250,242,.12);color:#F5EFE2;border:1px solid rgba(253,250,242,.2)}
 .fdone{text-align:center;padding:40px 30px 0}
 .fdone .big{font-family:var(--disp);font-size:56px;color:#E8D9B0}
 .fdone h2{font-family:var(--disp);font-weight:500;font-size:24px;color:#F5EFE2;margin-top:10px}
 .rtl .fdone h2{font-size:20px}
 .fdone p{color:#AFA98F;font-size:13px;margin-top:10px;line-height:1.6}

 /* my atlas */
 .macount{margin:16px 24px 0;padding:26px;text-align:center}
 .macount .n{font-family:var(--disp);font-weight:400;font-size:52px;line-height:1}
 .rtl .macount .n{font-size:42px;font-weight:500}
 .macount .n b{color:var(--ok);font-weight:500}
 .macount small{display:block;font-size:11.5px;color:var(--stone);margin-top:8px}
 .seg{display:flex;margin:14px 24px 0;background:var(--glass2);border:1px solid var(--gbord);border-radius:999px;padding:4px}
 .seg div{flex:1;text-align:center;padding:9px;border-radius:999px;font-size:12px;font-weight:700;color:var(--stone);cursor:pointer}
 .seg div.on{background:var(--ink);color:#F5EFE2}
 .marow{margin:10px 24px 0;padding:13px 16px;display:flex;align-items:center;gap:12px;border-radius:20px;cursor:pointer}
 .marow .dotc{width:10px;height:10px;border-radius:50%}
 .marow b{font-size:13.5px;font-weight:600}
 .marow small{margin-inline-start:auto;font-size:10.5px;color:var(--stone)}
 .maempty{margin:14px 24px 0;padding:26px;text-align:center;font-size:12.5px;color:var(--stone);line-height:1.7}

 /* chat */
 .chead{display:flex;align-items:center;gap:12px;padding:8px 24px 0}
 .chead .ava{width:42px;height:42px;border-radius:50%;background:var(--ink);color:#F0C98C;display:flex;align-items:center;justify-content:center;font-family:"Alexandria",sans-serif;font-size:17px;font-weight:700}
 .chead b{font-size:14px;font-weight:600;display:block}
 .chead small{font-size:10.5px;color:var(--ok);font-weight:600}
 .msgs{padding:16px 24px 0;display:flex;flex-direction:column;gap:11px}
 .msg{max-width:80%;padding:12px 16px;font-size:13px;line-height:1.65;border-radius:22px}
 .rtl .msg{font-size:12.5px;line-height:1.85}
 .msg.bot{align-self:flex-start;border-start-start-radius:8px}
 .msg.me{align-self:flex-end;background:var(--ink);color:#F5EFE2;border-start-end-radius:8px}
 .msg .cite{display:block;font-size:10px;color:var(--stone);margin-top:6px}
 .seeds{display:flex;gap:8px;overflow-x:auto;padding:12px 24px 0}
 .seeds::-webkit-scrollbar{display:none}
 .seed{white-space:nowrap;padding:9px 14px;border-radius:999px;font-size:11.5px;font-weight:600;cursor:pointer;background:var(--glass2);border:1px solid var(--gbord);color:#4A4438}
 .inputbar{margin:14px 24px 0;height:50px;border-radius:999px;display:flex;align-items:center;gap:10px;padding:0 8px 0 18px;color:var(--stone);font-size:12.5px}
 .rtl .inputbar{padding:0 18px 0 8px}
 .inputbar .send{margin-inline-start:auto;width:36px;height:36px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center}

 /* onboarding */
 .ob{justify-content:flex-end}
 .obscene{position:absolute;inset:0}
 .obscene svg{width:100%;height:100%}
 .obveil{position:absolute;inset:0;background:linear-gradient(rgba(240,228,206,0) 28%,rgba(240,228,206,.55) 60%,rgba(238,224,198,.97) 82%)}
 .obin{position:relative;z-index:3;padding:0 26px calc(env(safe-area-inset-bottom,16px) + 34px)}
 .obmark{font-family:"Alexandria",sans-serif;font-weight:700;font-size:44px;line-height:1}
 .obsub{font-size:10.5px;font-weight:700;letter-spacing:6px;color:var(--stone);margin-top:6px}
 .obin h1{font-family:var(--disp);font-weight:500;font-size:30px;line-height:1.16;margin-top:14px;text-wrap:balance}
 .rtl .obin h1{font-size:23px;line-height:1.5}
 .obin .sub{font-size:13px;color:var(--stone);margin-top:10px;line-height:1.6}
 .obtns{display:flex;flex-direction:column;gap:10px;margin-top:22px}
 .obtn{padding:16px;border-radius:999px;text-align:center;font-size:14px;font-weight:600;cursor:pointer}
 .obtn.dark{background:var(--ink);color:#F5EFE2}
 .obtn .arf{font-family:"IBM Plex Sans Arabic",sans-serif}
 .obtn small{display:block;font-size:10.5px;font-weight:500;opacity:.7;margin-top:2px}

 /* tab bar */
 .navfade{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,rgba(196,178,146,.92) 78%);z-index:35;pointer-events:none}
 .tabbar{position:absolute;bottom:calc(env(safe-area-inset-bottom,16px) + 10px);left:50%;transform:translateX(-50%);background:rgba(20,14,6,.92);backdrop-filter:blur(18px);border-radius:26px;padding:8px 10px;display:flex;gap:4px;box-shadow:0 18px 44px rgba(0,0,0,.38);z-index:40}
 .ti{display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:18px;padding:8px 13px;cursor:pointer;color:#A9A28A;font-size:9.5px;font-weight:600;min-width:60px;position:relative}
 .ti.on{background:var(--acc);color:#fff}
 .ti .bdg{position:absolute;top:4px;inset-inline-end:8px;min-width:15px;height:15px;border-radius:8px;background:var(--gold);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

 .toast{position:absolute;bottom:calc(env(safe-area-inset-bottom,16px) + 104px);left:0;right:0;display:flex;justify-content:center;z-index:60;pointer-events:none}
 .toast span{background:rgba(36,31,23,.94);color:#F5EFE2;font-size:12px;font-weight:500;border-radius:999px;padding:11px 19px;opacity:0;transform:translateY(8px);transition:all .3s var(--ease);max-width:84%;text-align:center}
 .toast.show span{opacity:1;transform:none}
</style>
</head>
<body>
<svg width="0" height="0"><defs>

  fDoneH:"اكتمل الدرب.",fDoneP:"ثلاث قصص مشيتها. كل محطة الآن على خريطة زياراتك — وثلاثة أماكن قرب هذا المسار بانتظارك.",fDoneCta:"ماذا يوجد قريباً؟",
  cN:"مرشد أطلس",cO:"يعرف الأماكن الـ٧١ كلها",cPh:"اسأل عن الواحة…",
  seeds:["خطط لي مساء الجمعة","الأفضل مع الأطفال؟","قهوة هادئة قرب العيون","هل السوق مفتوح بعد العشاء؟"],
  msgs:[["me","عصر الجمعة مع الأطفال — ما الخطة؟"],
   ["bot","ابدأوا بجبل القارة عند ٣:٣٠ — الكهوف على عشرين درجة والأطفال يعشقون الممرات. تذوق العسل عند ٥:٠٠، ثم البحيرة لغروب ٥:٤٨.","جبل القارة · مصنع العسل · البحيرة"]]}
};
let lang="en",T=STR.en,mode="here",saved=[],been=[],cur="qarah",lastTab="today",maSeg="saved",xF="all",fIdx=0,fActive=false;
const $=id=>document.getElementById(id);
const ARN=["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
const num=n=>lang==="ar"?String(n).split("").map(d=>ARN[+d]??d).join(""):String(n);

function stOf(k){return been.includes(k)?"been":saved.includes(k)?"saved":"none"}
function tile(k){
 const p=PLACES[k],L=p[lang];
 return `<div class="pt glass" onclick="openPlace('${k}')">
   <div class="th"><svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice"><use href="#${p.sc}"/></svg></div>
   <span class="st ${stOf(k)}"></span><b>${L.n}</b><small>${mode==="here"?L.open+" · "+num(p.dist)+(lang==="ar"?" د":" min"):L.m}</small></div>`;
}
function tabbar(active){
 const items=[["today","i-today",lang==="ar"?"اليوم":"Today"],["explore","i-compass",lang==="ar"?"استكشف":"Explore"],["trip","i-trip",lang==="ar"?"رحلتي":"Trip"],["matlas","i-me",lang==="ar"?"أطلسي":"My Atlas"]];
 return items.map(([id,ic,lb])=>`<div class="ti ${active===id?"on":""}" onclick="swap('${id}')">
   ${id==="trip"&&saved.length?`<span class="bdg">${num(saved.length)}</span>`:""}
   <svg class="ic s"><use href="#${ic}"/></svg>${lb}</div>`).join("");
}
function renderToday(){
 $("tHi").textContent=T.tHi;$("tCity").textContent=T.tCity;
 $("mHere").textContent=T.mHere;$("mPlan").textContent=T.mPlan;
 $("mHere").classList.toggle("on",mode==="here");$("mPlan").classList.toggle("on",mode==="plan");
 $("askPh").textContent=T.askPh;
 const f=PLACES.qarah[lang];
 $("featured").innerHTML=`<svg class="bg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice"><use href="#scQ"/></svg><div class="veil"></div>
  <div class="body"><span class="kick">${T.featKick}</span><h2>${lang==="ar"?"الليلة تبرد الواحة — والكهوف تحفظ سرّها.":"Tonight the oasis cools — and the caves keep their secret."}</h2>
  <p>${f.story.slice(0,80)}…</p><span class="cta">${T.featCta} <svg class="ic s flip"><use href="#i-arrow"/></svg></span></div>`;
 $("featured").onclick=()=>openPlace("qarah");
 const unseen=Object.keys(PLACES).filter(k=>!been.includes(k)&&!saved.includes(k));
 $("sereNo").textContent=num(String(unseen.length?Object.keys(PLACES).indexOf(unseen[0])+7:12).padStart(2,"0"))+" / "+num(71);
 $("sereT").textContent=T.sereT;$("sereS").textContent=T.sereS;
 $("tRail").textContent=mode==="here"?T.tRailHere:T.tRailPlan;$("tAll").textContent=T.tAll;
 const keys=Object.keys(PLACES).sort((a,b)=>mode==="here"?PLACES[a].dist-PLACES[b].dist:0);
 $("todayGrid").innerHTML=keys.map(tile).join("");
 $("tb1").innerHTML=tabbar("today");
}
function renderExplore(){
 $("xT").textContent=T.xT;
 $("xC").innerHTML=T.xCount(num(saved.length),num(been.length));
 $("xChips").innerHTML=T.chips.map(c=>`<div class="chip ${xF===c[0]?"on":""}" onclick="xF='${c[0]}';renderExplore()">${c[1]}</div>`).join("");
 $("xGrid").innerHTML=Object.keys(PLACES).filter(k=>xF==="all"||PLACES[k].cat===xF).map(tile).join("");
 $("tb2").innerHTML=tabbar("explore");
}
function renderTrip(){
 $("trT").textContent=T.trT;$("trC").textContent=T.trCount(num(saved.length));
 const R=ROUTE[lang];
 $("trRoutes").textContent=T.trRoutes;$("rN").textContent=R.n;$("rTag").textContent=R.tag;$("rM").textContent=R.m;$("rGo").textContent=R.go;
 if(!saved.length){
  $("tripBody").innerHTML=`<div class="trip-empty glass"><p>${T.trEmptyP}</p><small>${T.trEmptyS}</small>
   <span class="cta2" onclick="swap('today')">${T.trEmptyCta}</span></div>`;
 }else{
  const seq=[...saved].sort((a,b)=>PLACES[a].dist-PLACES[b].dist);
  $("tripBody").innerHTML=`<div class="plan glass">${seq.map((k,i)=>`
   <div class="stop"><div class="rail"><div class="n">${num(i+1)}</div>${i<seq.length-1?'<div class="l"></div>':""}</div>
   <div class="inf" onclick="openPlace('${k}')"><b>${PLACES[k][lang].n}</b><small>${PLACES[k][lang].m}</small></div>
   <span class="x" onclick="unsave('${k}')">✕</span></div>`).join("")}</div>`;
 }
 $("tb3").innerHTML=tabbar("trip");
}
function renderMa(){
 $("maT").textContent=T.maT;$("maN").textContent=num(been.length);$("maOf").textContent=" / "+num(71);
 $("maSub").textContent=T.maSub;
 $("segS").textContent=T.segS+(saved.length?` · ${num(saved.length)}`:"");
 $("segB").textContent=T.segB+(been.length?` · ${num(been.length)}`:"");
 $("segS").classList.toggle("on",maSeg==="saved");$("segB").classList.toggle("on",maSeg==="been");
 const list=maSeg==="saved"?saved:been;
 $("maList").innerHTML=list.length?list.map(k=>`
  <div class="marow glass" onclick="openPlace('${k}')"><span class="dotc" style="background:${maSeg==="been"?"var(--ok)":"var(--gold)"}"></span>
  <b>${PLACES[k][lang].n}</b><small>${PLACES[k][lang].m}</small></div>`).join("")
  :`<div class="maempty glass">${maSeg==="saved"?T.maEmptyS:T.maEmptyB}</div>`;
 $("tb4").innerHTML=tabbar("matlas");
}
function openPlace(k){
 cur=k;const p=PLACES[k],L=p[lang];
 const at=document.querySelector(".screen.active");if(at&&["today","explore","trip","matlas"].includes(at.id))lastTab=at.id;
 $("dScene").setAttribute("href","#"+p.sc);
 $("dKick").textContent=L.kick;$("dTitle").textContent=L.n;
 $("dGrid").innerHTML=L.grid.map(g=>`<div class="dcell glass"><span class="cb">${g[0]}</span><div class="nm">${g[1]}</div><div class="stt ${g[3]}">${g[2]}</div></div>`).join("");
 $("dSk").textContent=T.dSk;$("dStory").textContent=L.story;
 const R=ROUTE[lang];const onR=ROUTE.stops.includes(k);
 const near=Object.keys(PLACES).filter(x=>x!==k).slice(0,2);
 $("dExits").innerHTML=
  (onR?`<div class="exit glass" onclick="startRoute()"><svg class="ic s"><use href="#i-trip"/></svg><div><b>${T.exRoute(R.n)[0]}</b><small>${T.exRoute(R.n)[1]}</small></div><svg class="ic s chev flip"><use href="#i-arrow"/></svg></div>`:"")+
  `<div class="exit glass" onclick="openPlace('${near[0]}')"><svg class="ic s"><use href="#i-me"/></svg><div><b>${T.exNear}</b><small>${near.map(x=>PLACES[x][lang].n).join(" · ")}</small></div><svg class="ic s chev flip"><use href="#i-arrow"/></svg></div>`+
  (L.book?`<div class="exit glass" onclick="toast(T.bookToast)"><svg class="ic s"><use href="#i-wa"/></svg><div><b>${T.exBook}</b><small>${L.book} — ${T.exBookS}</small></div><svg class="ic s chev flip"><use href="#i-arrow"/></svg></div>`:"");
 updSaveBtn();$("dDir").textContent=T.dDir;$("dAsk").textContent=T.dAsk;
 swap("detail");
}
function updSaveBtn(){const s=saved.includes(cur)||been.includes(cur);
 $("dSave").textContent=s?T.dSaved:T.dSave;$("dSave").classList.toggle("saved",s)}
function toggleSave(){
 if(been.includes(cur))return;
 if(saved.includes(cur)){saved=saved.filter(x=>x!==cur);toast(lang==="ar"?"أُزيل من الرحلة":"Removed from trip")}
 else{saved.push(cur);toast(T.savedToast+" · "+num(saved.length))}
 updSaveBtn();
}
function unsave(k){saved=saved.filter(x=>x!==k);renderTrip()}
function serendipity(){
 const keys=Object.keys(PLACES),pick=keys[Math.floor(Math.random()*keys.length)];
 openPlace(pick);
}
function startRoute(){fIdx=0;fActive=true;renderFollow();swap("follow")}
function renderFollow(){
 const R=ROUTE[lang],n=ROUTE.stops.length;
 if(fIdx>=n){ // finish
  $("fScene").setAttribute("href","#scJ");
  $("fProg").textContent=num(n)+" / "+num(n);
  $("fBody").innerHTML=`<div class="fdone"><div class="big">${num(n)}/${num(n)}</div><h2>${T.fDoneH}</h2><p>${T.fDoneP}</p></div>
   <div class="fbtns"><div class="fb arr" onclick="swap('today')">${T.fDoneCta}</div></div>`;
  return;
 }
 const k=ROUTE.stops[fIdx],L=PLACES[k][lang];
 $("fScene").setAttribute("href","#"+PLACES[k].sc);
 $("fProg").textContent=T.fStop(num(fIdx+1),num(n));
 $("fBody").innerHTML=`<span class="kick">${L.kick}</span><h1>${L.n}</h1><p>${R.legs[fIdx]}</p>
  <div class="fbtns"><div class="fb ghost" onclick="toast(T.dirToast)">${T.dDir}</div>
  <div class="fb arr" onclick="arrive()">${T.fArr}</div></div>`;
}
function arrive(){
 const k=ROUTE.stops[fIdx];
 if(!been.includes(k)){been.push(k);saved=saved.filter(x=>x!==k)}
 toast(T.beenToast+" · "+num(been.length)+" / "+num(71));
 fIdx++;renderFollow();
}
function renderChat(){
 $("cN").textContent=T.cN;$("cO").textContent=T.cO;$("cPh").textContent=T.cPh;
 $("cMsgs").innerHTML=T.msgs.map(m=>`<div class="msg ${m[0]} ${m[0]==="bot"?"glass":""}">${m[1]}${m[2]?`<span class="cite">${m[2]}</span>`:""}</div>`).join("");
 $("cSeeds").innerHTML=T.seeds.map(s=>`<div class="seed" onclick="toast('${s}')">${s}</div>`).join("");
}
function renderAll(){renderToday();renderExplore();renderTrip();renderMa();renderChat()}
function finishOb(){renderAll();swap("today")}
function setLang(l){
 lang=l;T=STR[l];
 const ph=$("phone");
 ph.setAttribute("dir",l==="ar"?"rtl":"ltr");
 ph.classList.toggle("rtl",l==="ar");
 $("swEn").classList.toggle("on",l==="en");$("swAr").classList.toggle("on",l==="ar");
 $("obmT").textContent=l==="ar"?"الأحساء — متى؟":"Al-Ahsa — when?";
 $("obmS").textContent=l==="ar"?"سؤال واحد، ونرتب لك كل شيء.":"One question — we'll arrange everything around it.";
 $("obm1").textContent=l==="ar"?"أنا هنا الآن":"I'm here now";$("obm1s").textContent=l==="ar"?"رتّب ليلتي":"Sort my evening";
 $("obm2").textContent=l==="ar"?"أخطط لزيارة":"Planning a visit";$("obm2s").textContent=l==="ar"?"ابنِ رحلتي":"Build my trip";
 $("obm3").textContent=l==="ar"?"أحلم فقط":"Just dreaming";$("obm3s").textContent=l==="ar"?"أريني القصص":"Show me the stories";
 renderAll();
 const act=document.querySelector(".screen.active");
 if(act&&act.id==="detail")openPlace(cur);
 if(act&&act.id==="follow")renderFollow();
}
function swap(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");
 if(["today","explore","trip","matlas"].includes(id)){lastTab=id;renderAll()}
 const sc=document.querySelector("#"+id+" .scroll");if(sc)sc.scrollTop=0}
let tt;function toast(m){$("toasttxt").textContent=m;$("toast").classList.add("show");clearTimeout(tt);tt=setTimeout(()=>$("toast").classList.remove("show"),2100)}
setLang("en");
</script>
</body>
</html>
