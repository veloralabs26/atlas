<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atlas">
<meta name="theme-color" content="#3A2A44">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Atlas — أطلس</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=El+Messiri:wght@400;500;600&family=Alexandria:wght@500;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
 :root{
   --acc:#B85C38; --ok:#3E7D5C; --warn:#C15B4A; --gold:#C6862F;
   --ink:#241F17; --stone:#7A7160;
   --glass:rgba(253,250,242,.58); --glass2:rgba(253,250,242,.42);
   --gbord:rgba(255,255,255,.68);
   --disp:"Playfair Display",Georgia,serif; --ui:"Hanken Grotesk",-apple-system,sans-serif;
   --ease:cubic-bezier(.32,.72,.24,1);
 }
 .rtl{--disp:"El Messiri","IBM Plex Sans Arabic",sans-serif;--ui:"IBM Plex Sans Arabic",-apple-system,sans-serif}
 *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
 html,body{height:100%}
 body{background:#2B2136;font-family:"Hanken Grotesk",sans-serif;color:var(--ink);overscroll-behavior:none}
 .phone{width:100%;height:100dvh;overflow:hidden;position:relative;font-family:var(--ui);color:var(--ink)}
 .atmo{position:absolute;inset:0;background:
   radial-gradient(120% 55% at 82% -4%, rgba(248,211,158,.9), rgba(248,211,158,0) 50%),
   radial-gradient(130% 90% at 8% 104%, rgba(103,133,116,.5), rgba(103,133,116,0) 60%),
   linear-gradient(168deg,#4A4152 0%,#8A5540 26%,#C88E56 52%,#E1C08C 74%,#EAD9B4 100%)}
 .atmo .dune{position:absolute;left:-10%;right:-10%;height:32%;filter:blur(30px);opacity:.5;border-radius:50%}
 .atmo .d1{bottom:22%;background:#CE9B62}
 .atmo .d2{bottom:1%;background:#7E8E76;height:28%}

 .screen{position:absolute;inset:0;display:none;flex-direction:column}
 .screen.active{display:flex;animation:fade .3s ease}
 @keyframes fade{from{opacity:.55}to{opacity:1}}
 .scroll{flex:1;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,16px) + 120px)}
 .scroll::-webkit-scrollbar{display:none}

 .ic{width:20px;height:20px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
 .ic.s{width:15px;height:15px}
 .rtl .flip{transform:scaleX(-1)}
 .glass{background:var(--glass);backdrop-filter:blur(22px);border:1px solid var(--gbord);box-shadow:0 14px 34px rgba(50,36,24,.14), inset 0 1px 0 rgba(255,255,255,.7);border-radius:30px}

 /* ---------- top header that BLEEDS to the very top ---------- */
 .topbar{padding:calc(env(safe-area-inset-top,14px) + 10px) 22px 0;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
 .city{display:flex;align-items:center;gap:7px;cursor:pointer;color:#fff}
 .city .dot{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
 .city b{font-family:var(--disp);font-weight:500;font-size:18px;text-shadow:0 1px 10px rgba(0,0,0,.3)}
 .rtl .city b{font-size:16px;font-weight:600}
 .city small{font-size:10px;opacity:.85;display:block;margin-top:-1px}
 .hactions{display:flex;gap:8px}
 .hbtn{width:38px;height:38px;border-radius:50%;background:rgba(20,14,6,.24);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
 .hbtn .bd{position:absolute;top:6px;inset-inline-end:7px;width:7px;height:7px;border-radius:50%;background:var(--acc);border:1.5px solid #fff}

 /* today hero */
 .hero{padding:14px 22px 0}
 .hero .greet{color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.25)}
 .hero .greet small{font-size:12px;opacity:.9}
 .hero .greet h1{font-family:var(--disp);font-weight:500;font-size:30px;line-height:1.1;margin-top:3px}
 .rtl .hero .greet h1{font-size:25px;line-height:1.4;font-weight:500}
 .ask-inline{margin:16px 22px 0;height:50px;border-radius:999px;display:flex;align-items:center;gap:11px;padding:0 8px 0 18px;color:var(--stone);font-size:13px;cursor:pointer}
 .rtl .ask-inline{padding:0 18px 0 8px}
 .ask-inline .go{margin-inline-start:auto;width:36px;height:36px;border-radius:50%;background:var(--ink);color:#F5EFE2;display:flex;align-items:center;justify-content:center}

 .story{margin:18px 22px 0;border-radius:30px;overflow:hidden;position:relative;height:290px;cursor:pointer;box-shadow:0 18px 44px rgba(50,36,24,.24)}
 .story svg.bg{position:absolute;inset:0;width:100%;height:100%}
 .story .veil{position:absolute;inset:0;background:linear-gradient(rgba(20,14,6,.05) 34%,rgba(20,14,6,.74))}
 .story .tag{position:absolute;top:14px;inset-inline-start:14px;background:rgba(20,14,6,.42);backdrop-filter:blur(8px);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.4px;border-radius:999px;padding:6px 12px}
 .rtl .story .tag{letter-spacing:0;font-size:11px}
 .story .body{position:absolute;bottom:0;left:0;right:0;padding:22px;color:#fff}
 .story h2{font-family:var(--disp);font-weight:500;font-size:23px;line-height:1.15;text-wrap:balance}
 .rtl .story h2{font-size:19px;line-height:1.5}
 .story p{font-size:12px;opacity:.86;margin-top:7px;line-height:1.5}
 .story .cta{display:inline-flex;align-items:center;gap:8px;margin-top:13px;background:rgba(253,250,242,.94);color:var(--ink);border-radius:999px;padding:9px 16px;font-size:11.5px;font-weight:700}

 .slabel{padding:26px 24px 12px;font-size:10.5px;font-weight:700;letter-spacing:2px;color:var(--stone);display:flex;justify-content:space-between;align-items:baseline}
 .rtl .slabel{letter-spacing:0;font-size:12px}
 .slabel a{font-size:11px;color:var(--acc);font-weight:700;cursor:pointer;letter-spacing:.3px}

 .events{display:flex;gap:12px;overflow-x:auto;padding:2px 22px 2px}
 .events::-webkit-scrollbar{display:none}
 .evc{min-width:220px;border-radius:22px;padding:14px 16px;cursor:pointer}
 .evc .d{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--acc)}
 .rtl .evc .d{letter-spacing:0}
 .evc b{font-family:var(--disp);font-weight:500;font-size:15px;display:block;margin-top:5px}
 .rtl .evc b{font-size:14px;font-weight:600}
 .evc small{font-size:11px;color:var(--stone);display:block;margin-top:3px}

 .sere{margin:2px 22px 0;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer}
 .sere .no{font-family:var(--disp);font-size:24px;color:var(--gold);white-space:nowrap}
 .rtl .sere .no{font-size:20px}
 .sere b{font-size:13px;font-weight:600;display:block}
 .sere small{font-size:11px;color:var(--stone)}
 .sere .dice{margin-inline-start:auto;width:40px;height:40px;border-radius:50%;background:var(--ink);color:#F5EFE2;display:flex;align-items:center;justify-content:center;flex-shrink:0}

 /* place tiles */
 .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 22px}
 .pt{padding:9px 9px 4px;border-radius:26px;cursor:pointer;transition:transform .22s var(--ease);position:relative}
 .pt:active{transform:scale(.97)}
 .pt .th{height:88px;border-radius:18px;overflow:hidden;position:relative}
 .pt .th svg{width:100%;height:100%;display:block}
 .pt b{font-family:var(--disp);font-weight:500;font-size:14px;display:block;margin:9px 5px 0;line-height:1.2}
 .rtl .pt b{font-size:12.5px;font-weight:600}
 .pt small{font-size:10.5px;color:var(--stone);display:block;margin:3px 5px 9px}
 .pt .st{position:absolute;top:16px;inset-inline-end:16px;width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.92)}
 .st.saved{background:var(--gold)} .st.been{background:var(--ok)} .st.none{background:rgba(255,255,255,.35)}

 /* section header (non-today screens) */
 .shead{padding:calc(env(safe-area-inset-top,14px) + 14px) 24px 0;display:flex;align-items:flex-end;justify-content:space-between}
 .shead h1{font-family:var(--disp);font-weight:500;font-size:30px;color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.28)}
 .rtl .shead h1{font-size:25px;font-weight:600}
 .shead .sub{color:rgba(255,255,255,.85);font-size:12px;margin-top:3px}
 .toggle{display:flex;background:rgba(20,14,6,.24);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:4px;gap:2px}
 .toggle div{padding:7px 12px;border-radius:999px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px}
 .toggle div.on{background:#fff;color:var(--ink)}

 .chips{display:flex;gap:8px;overflow-x:auto;padding:16px 22px 6px}
 .chips::-webkit-scrollbar{display:none}
 .chip{white-space:nowrap;padding:9px 15px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;color:var(--stone);background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--gbord)}
 .chip.on{background:var(--ink);color:#F5EFE2;border-color:var(--ink)}

 .suggest{margin:16px 22px 0;padding:16px 18px;display:flex;align-items:center;gap:13px;cursor:pointer;border:1px dashed rgba(120,100,70,.4);background:rgba(253,250,242,.32)}
 .suggest .ic{color:var(--acc)}
 .suggest b{font-size:13px;font-weight:600;display:block}
 .suggest small{font-size:11px;color:var(--stone)}

 /* map view */
 .mapwrap{margin:14px 22px 0;border-radius:26px;overflow:hidden;position:relative;height:calc(100dvh - 320px);min-height:340px}
 .mapwrap svg{width:100%;height:100%;display:block}
 .mpin{cursor:pointer;transition:transform .2s var(--ease);transform-box:fill-box;transform-origin:center bottom}
 .mpin.on{transform:scale(1.3)}
 .mdeck{position:absolute;bottom:12px;left:0;right:0;display:flex;gap:10px;overflow-x:auto;padding:0 16px;scroll-snap-type:x mandatory}
 .mdeck::-webkit-scrollbar{display:none}
 .mcard{min-width:210px;scroll-snap-align:center;border-radius:20px;padding:12px 14px;cursor:pointer}
 .mcard b{font-family:var(--disp);font-weight:500;font-size:14px}
 .rtl .mcard b{font-size:13px;font-weight:600}
 .mcard small{font-size:10.5px;color:var(--stone);display:block;margin-top:2px}

 /* detail */
 .dhero{height:248px;position:relative;flex-shrink:0}
 .dhero svg{width:100%;height:100%;display:block}
 .dhero .veil{position:absolute;inset:0;background:linear-gradient(rgba(20,14,6,.14),transparent 34%,transparent 54%,rgba(20,14,6,.64))}
 .dtop{position:absolute;top:calc(env(safe-area-inset-top,14px) + 8px);inset-inline-start:16px;inset-inline-end:16px;display:flex;justify-content:space-between;z-index:5}
 .gbtn{width:40px;height:40px;border-radius:50%;background:rgba(20,14,6,.34);backdrop-filter:blur(12px);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
 .dlock{position:absolute;bottom:18px;inset-inline-start:22px;inset-inline-end:22px;color:#fff;z-index:4}
 .dlock .kick{font-size:9.5px;font-weight:700;letter-spacing:2.2px;opacity:.85;display:block;margin-bottom:8px}
 .rtl .dlock .kick{letter-spacing:0;font-size:11px}
 .dlock h1{font-family:var(--disp);font-weight:500;font-size:29px;line-height:1.06}
 .rtl .dlock h1{font-size:23px;line-height:1.4}
 .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 22px 0}
 .dcell{padding:15px 12px 13px;text-align:center}
 .dcell .cb{display:inline-block;background:rgba(253,250,242,.82);border:1px solid var(--gbord);border-radius:999px;font-size:10px;font-weight:600;padding:3px 11px}
 .dcell .nm{font-family:var(--disp);font-weight:400;font-size:23px;margin-top:8px}
 .rtl .dcell .nm{font-size:19px;font-weight:500}
 .dcell .stt{font-size:10.5px;font-weight:600;margin-top:5px}
 .stok{color:var(--ok)} .stmut{color:var(--stone)}
 .dstory{margin:16px 22px 0;padding:20px 22px;text-align:center}
 .dstory .k{font-size:11.5px;font-weight:500;opacity:.72}
 .dstory p{font-family:var(--disp);font-weight:400;font-size:17px;line-height:1.55;margin-top:8px}
 .rtl .dstory p{font-family:"IBM Plex Sans Arabic",sans-serif;font-size:14px;line-height:1.9}
 .exits{padding:16px 22px 0;display:flex;flex-direction:column;gap:10px}
 .exit{padding:14px 18px;display:flex;align-items:center;gap:13px;cursor:pointer;border-radius:22px}
 .exit .ic{color:var(--acc)}
 .exit b{font-size:13px;font-weight:600;display:block}
 .exit small{font-size:10.5px;color:var(--stone)}
 .exit .chev{margin-inline-start:auto;color:var(--stone)}
 .stickybar{position:absolute;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--gbord);border-radius:24px 24px 0 0;padding:12px 18px calc(env(safe-area-inset-bottom,16px) + 12px);display:flex;gap:9px;z-index:30}
 .sb{flex:1;padding:13px 6px;border-radius:999px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;background:rgba(253,250,242,.8);border:1px solid var(--gbord)}
 .sb.primary{background:var(--ink);color:#F5EFE2;border-color:var(--ink)}
 .sb.saved{background:var(--gold);color:#fff;border-color:var(--gold)}

 /* trip / paths */
 .empty{margin:18px 22px 0;padding:28px 24px;text-align:center}
 .empty p{font-family:var(--disp);font-size:17px;line-height:1.5;color:#3A3225}
 .rtl .empty p{font-size:14.5px;line-height:1.8}
 .empty small{display:block;font-size:11.5px;color:var(--stone);margin-top:9px}
 .empty .cta2{display:inline-block;margin-top:16px;background:var(--ink);color:#F5EFE2;border-radius:999px;padding:12px 22px;font-size:12.5px;font-weight:700;cursor:pointer}
 .plan{margin:14px 22px 0;padding:18px 20px}
 .plan .stop{display:flex;gap:13px}
 .plan .rail{display:flex;flex-direction:column;align-items:center}
 .plan .n{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#F5EFE2;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
 .plan .l{width:2px;flex:1;border-inline-start:2px dotted rgba(120,100,70,.35);min-height:18px}
 .plan .inf{padding-bottom:14px;flex:1;cursor:pointer}
 .plan .inf b{font-size:13.5px;font-weight:600;display:block}
 .rtl .plan .inf b{font-size:12.5px}
 .plan .inf small{font-size:10.5px;color:var(--stone)}
 .plan .x{color:#B5B0A2;cursor:pointer;font-size:15px;padding:0 4px}
 .routecard{margin:14px 22px 0;padding:18px 20px;cursor:pointer}
 .routecard .tp{display:flex;align-items:baseline;justify-content:space-between}
 .routecard b.nm{font-family:var(--disp);font-weight:500;font-size:17px}
 .rtl .routecard b.nm{font-size:15px;font-weight:600}
 .routecard .tag{font-size:9.5px;font-weight:700;border-radius:999px;padding:4px 10px;background:rgba(253,250,242,.85);border:1px solid var(--gbord);color:var(--stone)}
 .routecard .mt{font-size:11px;color:var(--stone);margin-top:4px}
 .routecard .startbtn{margin-top:14px;background:var(--acc);color:#fff;border-radius:999px;padding:12px;text-align:center;font-size:12.5px;font-weight:700}

 /* follow mode */
 #follow{background:#1B1410}
 #follow .fhero{height:42%;position:relative;flex-shrink:0}
 #follow .fhero svg{width:100%;height:100%;display:block}
 #follow .fhero .veil{position:absolute;inset:0;background:linear-gradient(rgba(20,14,6,.3),transparent 40%,rgba(27,20,16,.96))}
 .fprog{position:absolute;top:calc(env(safe-area-inset-top,14px) + 10px);left:0;right:0;display:flex;justify-content:center;z-index:6}
 .fprog span{background:rgba(20,14,6,.5);backdrop-filter:blur(10px);color:#F5EFE2;font-size:11px;font-weight:700;border-radius:999px;padding:7px 16px}
 .fclose{position:absolute;top:calc(env(safe-area-inset-top,14px) + 6px);inset-inline-end:16px;z-index:6}
 .fbody{flex:1;padding:0 24px;color:#F5EFE2;display:flex;flex-direction:column}
 .fbody .kick{font-size:9.5px;font-weight:700;letter-spacing:2.2px;color:#C9B98A;margin-top:6px}
 .rtl .fbody .kick{letter-spacing:0;font-size:11px}
 .fbody h1{font-family:var(--disp);font-weight:500;font-size:29px;margin-top:6px}
 .rtl .fbody h1{font-size:23px}
 .fbody p{font-size:13.5px;line-height:1.65;color:#CFC5AE;margin-top:10px}
 .rtl .fbody p{font-size:12.5px;line-height:1.85}
 .fbtns{margin-top:auto;padding-bottom:calc(env(safe-area-inset-bottom,16px) + 18px);display:flex;gap:10px}
 .fb{flex:1;padding:15px;border-radius:999px;text-align:center;font-size:13px;font-weight:700;cursor:pointer}
 .fb.arr{background:var(--ok);color:#fff}
 .fb.ghost{background:rgba(253,250,242,.12);color:#F5EFE2;border:1px solid rgba(253,250,242,.2)}
 .fdone{text-align:center;padding:36px 28px 0}
 .fdone .big{font-family:var(--disp);font-size:52px;color:#E8D9B0}
 .fdone h2{font-family:var(--disp);font-weight:500;font-size:23px;color:#F5EFE2;margin-top:10px}
 .rtl .fdone h2{font-size:19px}
 .fdone p{color:#AFA98F;font-size:13px;margin-top:10px;line-height:1.6}
 .rtl .fdone p{font-size:12px;line-height:1.8}

 /* saved / my atlas */
 .macount{margin:16px 22px 0;padding:24px;text-align:center}
 .macount .n{font-family:var(--disp);font-weight:400;font-size:50px;line-height:1}
 .rtl .macount .n{font-size:40px;font-weight:500}
 .macount .n b{color:var(--ok);font-weight:500}
 .macount small{display:block;font-size:11.5px;color:var(--stone);margin-top:8px}
 .seg{display:flex;margin:14px 22px 0;background:var(--glass2);border:1px solid var(--gbord);border-radius:999px;padding:4px}
 .seg div{flex:1;text-align:center;padding:9px;border-radius:999px;font-size:12px;font-weight:700;color:var(--stone);cursor:pointer}
 .seg div.on{background:var(--ink);color:#F5EFE2}
 .marow{margin:10px 22px 0;padding:13px 16px;display:flex;align-items:center;gap:12px;border-radius:20px;cursor:pointer}
 .marow .dotc{width:10px;height:10px;border-radius:50%}
 .marow b{font-size:13.5px;font-weight:600}
 .rtl .marow b{font-size:12.5px}
 .marow small{margin-inline-start:auto;font-size:10.5px;color:var(--stone)}
 .maempty{margin:14px 22px 0;padding:26px;text-align:center;font-size:12.5px;color:var(--stone);line-height:1.7}

 /* ask / chat */
 .chead{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top,14px) + 14px) 24px 0}
 .chead .ava{width:44px;height:44px;border-radius:50%;background:var(--ink);color:#F0C98C;display:flex;align-items:center;justify-content:center;font-family:"Alexandria",sans-serif;font-size:17px;font-weight:700}
 .chead b{font-size:15px;font-weight:600;display:block;color:#fff}
 .chead small{font-size:10.5px;color:rgba(255,255,255,.85);font-weight:600}
 .msgs{padding:16px 22px 0;display:flex;flex-direction:column;gap:11px}
 .msg{max-width:82%;padding:12px 16px;font-size:13px;line-height:1.6;border-radius:22px}
 .rtl .msg{font-size:12.5px;line-height:1.8}
 .msg.bot{align-self:flex-start;border-start-start-radius:8px}
 .msg.me{align-self:flex-end;background:var(--ink);color:#F5EFE2;border-start-end-radius:8px}
 .msg .cite{display:block;font-size:10px;color:var(--stone);margin-top:6px}
 .seeds{display:flex;gap:8px;overflow-x:auto;padding:12px 22px 0}
 .seeds::-webkit-scrollbar{display:none}
 .seed{white-space:nowrap;padding:9px 14px;border-radius:999px;font-size:11.5px;font-weight:600;cursor:pointer;background:var(--glass2);border:1px solid var(--gbord);color:#3A3225}
 .inputbar{margin:14px 22px 0;height:50px;border-radius:999px;display:flex;align-items:center;gap:10px;padding:0 8px 0 18px;color:var(--stone);font-size:12.5px}
 .rtl .inputbar{padding:0 18px 0 8px}
 .inputbar .send{margin-inline-start:auto;width:36px;height:36px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center}

 /* settings */
 .setgrp{margin:16px 22px 0;padding:6px 4px;overflow:hidden}
 .setrow{padding:14px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;border-bottom:1px solid rgba(120,100,70,.12)}
 .setrow:last-child{border-bottom:none}
 .setrow .ic{color:var(--acc)}
 .setrow b{font-size:13.5px;font-weight:600}
 .rtl .setrow b{font-size:12.5px}
 .setrow .val{margin-inline-start:auto;font-size:12px;color:var(--stone);display:flex;align-items:center;gap:6px}
 .langpick{display:flex;background:var(--glass2);border:1px solid var(--gbord);border-radius:999px;padding:3px;margin-inline-start:auto}
 .langpick div{padding:6px 13px;border-radius:999px;font-size:11px;font-weight:700;color:var(--stone);cursor:pointer}
 .langpick div.on{background:var(--ink);color:#F5EFE2}
 .setgrp .glabel{font-size:10px;font-weight:700;letter-spacing:1.6px;color:var(--stone);padding:8px 16px 4px}
 .rtl .setgrp .glabel{letter-spacing:0;font-size:11px}

 /* onboarding */
 .ob{justify-content:flex-end}
 .obscene{position:absolute;inset:0}
 .obscene svg{width:100%;height:100%}
 .obveil{position:absolute;inset:0;background:linear-gradient(rgba(240,228,206,0) 26%,rgba(238,224,198,.6) 58%,rgba(236,222,196,.98) 84%)}
 .obin{position:relative;z-index:3;padding:0 26px calc(env(safe-area-inset-bottom,16px) + 34px)}
 .obmark{font-family:"Alexandria",sans-serif;font-weight:700;font-size:46px;line-height:1}
 .obsub{font-size:10.5px;font-weight:700;letter-spacing:6px;color:var(--stone);margin-top:6px}
 .obin h1{font-family:var(--disp);font-weight:500;font-size:30px;line-height:1.16;margin-top:14px;text-wrap:balance}
 .rtl .obin h1{font-size:25px;line-height:1.5}
 .obin .sub{font-size:13px;color:var(--stone);margin-top:10px;line-height:1.6}
 .obtns{display:flex;flex-direction:column;gap:10px;margin-top:22px}
 .obtn{padding:16px;border-radius:999px;text-align:center;font-size:14px;font-weight:600;cursor:pointer}
 .obtn.dark{background:var(--ink);color:#F5EFE2}
 .obtn .arf{font-family:"IBM Plex Sans Arabic",sans-serif}

 /* sheet */
 .sheetwrap{position:absolute;inset:0;background:rgba(20,14,6,.5);z-index:80;display:none;align-items:flex-end}
 .sheetwrap.open{display:flex}
 .sheet{background:#F3ECDD;border-radius:28px 28px 0 0;width:100%;padding:10px 22px calc(env(safe-area-inset-bottom,16px) + 22px);animation:up .34s var(--ease);max-height:80%;overflow-y:auto}
 .sheet::-webkit-scrollbar{display:none}
 @keyframes up{from{transform:translateY(60px);opacity:.5}to{transform:none;opacity:1}}
 .grab{width:38px;height:4px;border-radius:2px;background:#D8CFBC;margin:0 auto 10px}
 .sheet h3{font-family:var(--disp);font-weight:500;font-size:21px;text-align:center;margin-bottom:4px}
 .rtl .sheet h3{font-size:18px;font-weight:600}
 .sheet .ssub{text-align:center;font-size:12px;color:var(--stone);margin-bottom:14px}
 .cityrow{padding:14px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;border-radius:18px;margin-bottom:8px;background:rgba(255,255,255,.5);border:1px solid var(--gbord)}
 .cityrow.on{outline:2px solid var(--acc);outline-offset:1px}
 .cityrow .fl{font-size:22px}
 .cityrow b{font-size:14px;font-weight:600;display:block}
 .rtl .cityrow b{font-size:13px}
 .cityrow small{font-size:10.5px;color:var(--stone)}
 .cityrow .soon{margin-inline-start:auto;font-size:9.5px;font-weight:700;color:var(--stone);background:rgba(120,100,70,.12);border-radius:999px;padding:4px 10px}
 .cityrow .live{margin-inline-start:auto;display:flex;gap:5px;align-items:center;font-size:9.5px;font-weight:700;color:var(--ok)}
 .cityrow .live i{width:6px;height:6px;border-radius:50%;background:var(--ok)}

 /* tab bar */
 .navfade{position:absolute;bottom:0;left:0;right:0;height:118px;background:linear-gradient(transparent,rgba(228,192,140,.92) 76%);z-index:35;pointer-events:none}
 .tabbar{position:absolute;bottom:calc(env(safe-area-inset-bottom,16px) + 10px);left:50%;transform:translateX(-50%);background:rgba(20,14,6,.92);backdrop-filter:blur(18px);border-radius:26px;padding:7px 8px;display:flex;gap:2px;box-shadow:0 18px 44px rgba(0,0,0,.4);z-index:40}
 .ti{display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:18px;padding:8px 11px;cursor:pointer;color:#A9A28A;font-size:9px;font-weight:600;min-width:56px;position:relative}
 .ti.on{background:var(--acc);color:#fff}
 .ti .bd{position:absolute;top:4px;inset-inline-end:9px;min-width:15px;height:15px;border-radius:8px;background:var(--gold);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

 .toast{position:absolute;bottom:calc(env(safe-area-inset-bottom,16px) + 104px);left:0;right:0;display:flex;justify-content:center;z-index:60;pointer-events:none}
 .toast span{background:rgba(36,31,23,.94);color:#F5EFE2;font-size:12px;font-weight:500;border-radius:999px;padding:11px 19px;opacity:0;transform:translateY(8px);transition:all .3s var(--ease);max-width:84%;text-align:center}
 .toast.show span{opacity:1;transform:none}
</style>
</head>

<div class="phone" id="phone" dir="ltr">
  <div class="atmo"><div class="dune d1"></div><div class="dune d2"></div></div>

  <!-- OB 1 -->
  <div class="screen ob active" id="ob1">
    <div class="obscene"><svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice"><use href="#scQ"/></svg><div class="obveil"></div></div>
    <div class="obin">
      <div class="obmark">أطلس</div><div class="obsub">ATLAS</div>
      <h1>The places you haven't met yet.</h1>
      <div class="obtns">
        <div class="obtn dark" onclick="setLang('en');swap('ob2')">Continue in English</div>
        <div class="obtn glass" onclick="setLang('ar');swap('ob2')"><span class="arf">المتابعة بالعربية</span></div>
      </div>
    </div>
  </div>
  <!-- OB 2: welcome (no mode question) -->
  <div class="screen ob" id="ob2">
    <div class="obscene"><svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice"><use href="#scS"/></svg><div class="obveil"></div></div>
    <div class="obin">
      <h1 id="ob2T"></h1>
      <p class="sub" id="ob2S"></p>
      <div class="obtns"><div class="obtn dark" onclick="swap('today')" id="ob2B"></div></div>
    </div>
  </div>

  <!-- TODAY -->
  <div class="screen" id="today">
    <div class="scroll">
      <div class="topbar">
        <div class="city" onclick="openSheet('city')">
          <div class="dot"><svg class="ic s"><use href="#i-pin"/></svg></div>
          <div><b id="tCity"></b><small id="tCityS"></small></div>
          <svg class="ic s" style="opacity:.8"><use href="#i-chev"/></svg>
        </div>
        <div class="hactions">
          <div class="hbtn" onclick="toast(T.notifToast)"><svg class="ic s"><use href="#i-bell"/></svg><span class="bd"></span></div>
          <div class="hbtn" onclick="swap('settings')"><svg class="ic s"><use href="#i-gear"/></svg></div>
        </div>
      </div>
      <div class="hero"><div class="greet"><small id="tHi"></small><h1 id="tGreet"></h1></div></div>
      <div class="ask-inline glass" onclick="swap('ask')"><svg class="ic s"><use href="#i-ask"/></svg><span id="tAsk"></span><div class="go"><svg class="ic s flip"><use href="#i-arrow"/></svg></div></div>

      <div class="story" id="featured"></div>

      <div class="slabel"><span id="tEvents"></span></div>
      <div class="events" id="eventRow"></div>

      <div class="sere glass" onclick="serendipity()">
        <span class="no" id="sereNo"></span>
        <div><b id="sereT"></b><small id="sereS"></small></div>
        <div class="dice"><svg class="ic"><use href="#i-dice"/></svg></div>
      </div>

      <div class="slabel"><span id="tRail"></span><a onclick="swap('explore')" id="tAll"></a></div>
      <div class="grid2" id="todayGrid"></div>
    </div>
    <div class="navfade"></div><div class="tabbar" id="tb1"></div>
  </div>

  <!-- EXPLORE -->
  <div class="screen" id="explore">
    <div class="scroll">
      <div class="shead">
        <div><h1 id="xT"></h1><div class="sub" id="xC"></div></div>
        <div class="toggle"><div id="xList" class="on" onclick="xView='list';renderExplore()"><svg class="ic s"><use href="#i-list"/></svg></div><div id="xMap" onclick="xView='map';renderExplore()"><svg class="ic s"><use href="#i-map"/></svg></div></div>
      </div>
      <div class="chips" id="xChips"></div>
      <div id="xBody"></div>
      <div class="suggest glass" onclick="toast(T.suggestToast)"><svg class="ic s"><use href="#i-plus"/></svg><div><b id="sgT"></b><small id="sgS"></small></div></div>
    </div>
    <div class="navfade"></div><div class="tabbar" id="tb2"></div>
  </div>

  <!-- ASK (AI concierge) -->
  <div class="screen" id="ask">
    <div class="scroll" style="padding-bottom:calc(env(safe-area-inset-bottom,16px) + 30px)">
      <div class="chead"><div class="ava">أ</div><div><b id="cN"></b><small id="cO"></small></div></div>
      <div class="msgs" id="cMsgs"></div>
      <div class="seeds" id="cSeeds"></div>
      <div class="inputbar glass"><span id="cPh"></span><div class="send"><svg class="ic s flip"><use href="#i-arrow"/></svg></div></div>
    </div>
    <div class="navfade"></div><div class="tabbar" id="tb3"></div>
  </div>

  <!-- TRIP -->
  <div class="screen" id="trip">
    <div class="scroll">
      <div class="shead"><div><h1 id="trT"></h1><div class="sub" id="trC"></div></div></div>
      <div id="tripBody"></div>
      <div class="slabel"><span id="trRoutes"></span></div>
      <div class="routecard glass" onclick="startRoute()">
        <div class="tp"><b class="nm" id="rN"></b><span class="tag" id="rTag"></span></div>
        <div class="mt" id="rM"></div>
        <div class="startbtn" id="rGo"></div>
      </div>
    </div>
    <div class="navfade"></div><div class="tabbar" id="tb4"></div>
  </div>

  <!-- SAVED -->
  <div class="screen" id="saved">
    <div class="scroll">
      <div class="shead"><div><h1 id="maT"></h1></div></div>
      <div class="macount glass"><div class="n"><b id="maN">0</b><span id="maOf"> / 71</span></div><small id="maSub"></small></div>
      <div class="seg"><div class="on" id="segS" onclick="maSeg='saved';renderSaved()"></div><div id="segB" onclick="maSeg='been';renderSaved()"></div></div>
      <div id="maList"></div>
    </div>
    <div class="navfade"></div><div class="tabbar" id="tb5"></div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="settings">
    <div class="scroll">
      <div class="shead"><div class="gbtn" style="background:rgba(20,14,6,.24)" onclick="swap('today')"><svg class="ic flip"><use href="#i-back"/></svg></div><h1 id="stT" style="flex:1;text-align:center;margin-inline-end:40px"></h1></div>
      <div class="setgrp glass">
        <div class="glabel" id="stLang"></div>
        <div class="setrow"><svg class="ic s"><use href="#i-globe"/></svg><b id="stLangL"></b>
          <div class="langpick"><div id="stEn" onclick="setLang('en')">EN</div><div id="stAr" onclick="setLang('ar')">عربي</div></div></div>
      </div>
      <div class="setgrp glass">
        <div class="glabel" id="stMore"></div>
        <div class="setrow" onclick="toast(T.shareToast)"><svg class="ic s"><use href="#i-share"/></svg><b id="stShare"></b><span class="val"><svg class="ic s flip"><use href="#i-chev"/></svg></span></div>
        <div class="setrow" onclick="openSheet('tools')"><svg class="ic s"><use href="#i-tools"/></svg><b id="stTools"></b><span class="val"><svg class="ic s flip"><use href="#i-chev"/></svg></span></div>
        <div class="setrow" onclick="openSheet('about')"><svg class="ic s"><use href="#i-info"/></svg><b id="stAbout"></b><span class="val"><svg class="ic s flip"><use href="#i-chev"/></svg></span></div>
        <div class="setrow" onclick="openSheet('contact')"><svg class="ic s"><use href="#i-phone"/></svg><b id="stContact"></b><span class="val"><svg class="ic s flip"><use href="#i-chev"/></svg></span></div>
      </div>
      <div style="text-align:center;padding:20px;color:var(--stone);font-size:11px" id="stVer"></div>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="detail">
    <div class="scroll" style="padding-bottom:calc(env(safe-area-inset-bottom,16px) + 128px)">
      <div class="dhero">
        <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice"><use id="dScene" href="#scQ"/></svg>
        <div class="veil"></div>
        <div class="dtop"><div class="gbtn" onclick="swap(lastTab)"><svg class="ic flip"><use href="#i-back"/></svg></div><div class="gbtn" onclick="toast(T.shareToast)"><svg class="ic"><use href="#i-share"/></svg></div></div>
        <div class="dlock"><span class="kick" id="dKick"></span><h1 id="dTitle"></h1></div>
      </div>

 $("tEvents").textContent=T.tEvents;
 $("eventRow").innerHTML=T.events.map(e=>`<div class="evc glass" onclick="toast('${e[1]}')"><div class="d">${e[0]}</div><b>${e[1]}</b><small>${e[2]}</small></div>`).join("");
 const unseen=Object.keys(PLACES).filter(k=>stOf(k)==="none");
 $("sereNo").textContent=num(String(unseen.length?Object.keys(PLACES).indexOf(unseen[0])+7:12).padStart(2,"0"))+" / "+num(71);
 $("sereT").textContent=T.sereT;$("sereS").textContent=T.sereS;
 $("tRail").textContent=T.tRail;$("tAll").textContent=T.tAll;
 const keys=Object.keys(PLACES).sort((a,b)=>PLACES[a].dist-PLACES[b].dist).slice(0,4);
 $("todayGrid").innerHTML=keys.map(tile).join("");
 $("tb1").innerHTML=tabbar("today");
}
function renderExplore(){
 $("xT").textContent=T.xT;
 const list=Object.keys(PLACES).filter(k=>xF==="all"||PLACES[k].cat===xF);
 $("xC").innerHTML=T.xC(num(list.length));
 $("xList").classList.toggle("on",xView==="list");$("xMap").classList.toggle("on",xView==="map");
 $("xChips").innerHTML=T.chips.map(c=>`<div class="chip ${xF===c[0]?"on":""}" onclick="xF='${c[0]}';renderExplore()">${c[1]}</div>`).join("");
 if(xView==="list"){
  $("xBody").innerHTML=`<div class="grid2" style="margin-top:6px">${list.map(tile).join("")}</div>`;
 }else{
  $("xBody").innerHTML=`<div class="mapwrap glass">
    <svg viewBox="0 0 400 620" preserveAspectRatio="xMidYMid slice"><use href="#oasisMap"/>
    ${list.map((k,i)=>`<g class="mpin" onclick="mpinTap('${k}')" transform="translate(${PLACES[k].px},${PLACES[k].py})"><path d="M0 0 C-9 -12 -13 -18 -13 -25 a13 13 0 1 1 26 0 C13 -18 9 -12 0 0z" fill="${stOf(k)==='been'?'#3E7D5C':stOf(k)==='saved'?'#C6862F':'#B85C38'}"/><circle cy="-25" r="5" fill="#FDFBF6"/></g>`).join("")}</svg>
    <div class="mdeck" id="mdeck">${list.map(k=>`<div class="mcard glass" id="mc-${k}" onclick="openPlace('${k}')"><b>${PLACES[k][lang].n}</b><small>${PLACES[k][lang].m}</small></div>`).join("")}</div>
  </div>`;
 }
 $("sgT").textContent=T.sgT;$("sgS").textContent=T.sgS;
 $("tb2").innerHTML=tabbar("explore");
}
function mpinTap(k){document.querySelectorAll(".mpin").forEach(p=>p.classList.remove("on"));event.currentTarget.classList.add("on");const c=$("mc-"+k);if(c)c.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"})}
function renderAsk(){
 $("cN").textContent=T.cN;$("cO").textContent=T.cO;$("cPh").textContent=T.cPh;
 $("cMsgs").innerHTML=T.msgs.map(m=>`<div class="msg ${m[0]} ${m[0]==="bot"?"glass":""}">${m[1]}${m[2]?`<span class="cite">${m[2]}</span>`:""}</div>`).join("");
 $("cSeeds").innerHTML=T.seeds.map(s=>`<div class="seed" onclick="toast('${s}')">${s}</div>`).join("");
 $("tb3").innerHTML=tabbar("ask");
}
function renderTrip(){
 $("trT").textContent=T.trT;$("trC").textContent=T.trC(saved.length?num(saved.length):0);
 const R=ROUTE[lang];$("trRoutes").textContent=T.trRoutes;$("rN").textContent=R.n;$("rTag").textContent=R.tag;$("rM").textContent=R.m;$("rGo").textContent=R.go;
 if(!saved.length){$("tripBody").innerHTML=`<div class="empty glass"><p>${T.trEmptyP}</p><small>${T.trEmptyS}</small><span class="cta2" onclick="swap('today')">${T.trEmptyCta}</span></div>`;}
 else{const seq=[...saved].sort((a,b)=>PLACES[a].dist-PLACES[b].dist);
  $("tripBody").innerHTML=`<div class="plan glass">${seq.map((k,i)=>`<div class="stop"><div class="rail"><div class="n">${num(i+1)}</div>${i<seq.length-1?'<div class="l"></div>':""}</div><div class="inf" onclick="openPlace('${k}')"><b>${PLACES[k][lang].n}</b><small>${PLACES[k][lang].m}</small></div><span class="x" onclick="unsave('${k}')">✕</span></div>`).join("")}</div>`;}
 $("tb4").innerHTML=tabbar("trip");
}
function renderSaved(){
 $("maT").textContent=T.maT;$("maN").textContent=num(been.length);$("maOf").textContent=" / "+num(71);$("maSub").textContent=T.maSub;
 $("segS").textContent=T.segS+(saved.length?` · ${num(saved.length)}`:"");$("segB").textContent=T.segB+(been.length?` · ${num(been.length)}`:"");
 $("segS").classList.toggle("on",maSeg==="saved");$("segB").classList.toggle("on",maSeg==="been");
 const list=maSeg==="saved"?saved:been;
 $("maList").innerHTML=list.length?list.map(k=>`<div class="marow glass" onclick="openPlace('${k}')"><span class="dotc" style="background:${maSeg==="been"?"var(--ok)":"var(--gold)"}"></span><b>${PLACES[k][lang].n}</b><small>${PLACES[k][lang].m}</small></div>`).join(""):`<div class="maempty glass">${maSeg==="saved"?T.maEmptyS:T.maEmptyB}</div>`;
 $("tb5").innerHTML=tabbar("saved");
}
function renderSettings(){
 $("stT").textContent=T.stT;$("stLang").textContent=T.stLang;$("stLangL").textContent=T.stLangL;
 $("stEn").classList.toggle("on",lang==="en");$("stAr").classList.toggle("on",lang==="ar");
 $("stMore").textContent=T.stMore;$("stShare").textContent=T.stShare;$("stTools").textContent=T.stTools;$("stAbout").textContent=T.stAbout;$("stContact").textContent=T.stContact;$("stVer").textContent=T.stVer;
}
function openPlace(k){cur=k;const p=PLACES[k],L=p[lang];
 const at=document.querySelector(".screen.active");if(at&&["today","explore","trip","saved","ask"].includes(at.id))lastTab=at.id;
 $("dScene").setAttribute("href","#"+p.sc);$("dKick").textContent=L.kick;$("dTitle").textContent=L.n;
 $("dGrid").innerHTML=L.grid.map(g=>`<div class="dcell glass"><span class="cb">${g[0]}</span><div class="nm">${g[1]}</div><div class="stt ${g[3]}">${g[2]}</div></div>`).join("");
 $("dSk").textContent=T.dSk;$("dStory").textContent=L.story;
 const R=ROUTE[lang],onR=ROUTE.stops.includes(k),near=Object.keys(PLACES).filter(x=>x!==k).sort((a,b)=>Math.abs(PLACES[a].dist-p.dist)-Math.abs(PLACES[b].dist-p.dist)).slice(0,2);
 $("dExits").innerHTML=(onR?`<div class="exit glass" onclick="startRoute()"><svg class="ic s"><use href="#i-trip"/></svg><div><b>${T.exRoute(R.n)[0]}</b><small>${T.exRoute(R.n)[1]}</small></div><svg class="ic s chev flip"><use href="#i-arrow"/></svg></div>`:"")+
  `<div class="exit glass" onclick="openPlace('${near[0]}')"><svg class="ic s"><use href="#i-pin"/></svg><div><b>${T.exNear}</b><small>${near.map(x=>PLACES[x][lang].n).join(" · ")}</small></div><svg class="ic s chev flip"><use href="#i-arrow"/></svg></div>`+
  (L.book?`<div class="exit glass" onclick="toast(T.bookToast)"><svg class="ic s"><use href="#i-wa"/></svg><div><b>${T.exBook}</b><small>${L.book} — ${T.exBookS}</small></div><svg class="ic s chev flip"><use href="#i-arrow"/></svg></div>`:"");
 updSave();$("dDir").textContent=T.dDir;$("dAsk").textContent=T.dAsk;swap("detail");
}
function updSave(){const s=saved.includes(cur)||been.includes(cur);$("dSave").textContent=s?T.dSaved:T.dSave;$("dSave").classList.toggle("saved",s)}
function toggleSave(){if(been.includes(cur))return;if(saved.includes(cur)){saved=saved.filter(x=>x!==cur);toast(lang==="ar"?"أُزيل":"Removed")}else{saved.push(cur);toast(T.savedToast+" · "+num(saved.length))}updSave()}
function unsave(k){saved=saved.filter(x=>x!==k);renderTrip()}
function serendipity(){const keys=Object.keys(PLACES);openPlace(keys[Math.floor((Date.now()/1000)%keys.length)])}
function startRoute(){fIdx=0;renderFollow();swap("follow")}
function renderFollow(){const R=ROUTE[lang],n=ROUTE.stops.length;
 if(fIdx>=n){$("fScene").setAttribute("href","#scJ");$("fProg").textContent=num(n)+" / "+num(n);
  $("fBody").innerHTML=`<div class="fdone"><div class="big">${num(n)}/${num(n)}</div><h2>${T.fDoneH}</h2><p>${T.fDoneP}</p></div><div class="fbtns"><div class="fb arr" onclick="swap('today')">${T.fDoneCta}</div></div>`;return;}
 const k=ROUTE.stops[fIdx],L=PLACES[k][lang];$("fScene").setAttribute("href","#"+PLACES[k].sc);$("fProg").textContent=T.fStop(num(fIdx+1),num(n));
 $("fBody").innerHTML=`<span class="kick">${L.kick}</span><h1>${L.n}</h1><p>${R.legs[fIdx]}</p><div class="fbtns"><div class="fb ghost" onclick="toast(T.dirToast)">${T.dDir}</div><div class="fb arr" onclick="arrive()">${T.fArr}</div></div>`;
}
function arrive(){const k=ROUTE.stops[fIdx];if(!been.includes(k)){been.push(k);saved=saved.filter(x=>x!==k)}toast(T.beenToast+" · "+num(been.length)+" / "+num(71));fIdx++;renderFollow()}
/* sheets */
function openSheet(id){renderSheet(id);$("sheet-"+id).classList.add("open")}
function closeSheet(id){$("sheet-"+id).classList.remove("open")}
function renderSheet(id){
 if(id==="city"){$("shCityT").textContent=T.shCityT;$("shCityS").textContent=T.shCityS;
  $("cityList").innerHTML=CITIES.map(([k,fl,soon])=>`<div class="cityrow ${k===city?"on":""}" onclick="pickCity('${k}',${soon})"><span class="fl">${fl}</span><div><b>${T.cities[k][0]}</b><small>${T.cities[k][1]}</small></div>${soon?`<span class="soon">${lang==="ar"?"قريباً":"SOON"}</span>`:`<span class="live"><i></i>${lang==="ar"?"متاحة":"LIVE"}</span>`}</div>`).join("");}
 if(id==="tools"){$("shToolsT").textContent=T.shToolsT;$("toolsList").innerHTML=T.tools.map(t=>`<div class="cityrow" onclick="toast('${t[0]}')"><svg class="ic" style="color:var(--acc)"><use href="#i-tools"/></svg><div><b>${t[0]}</b><small>${t[1]}</small></div></div>`).join("");}
 if(id==="about"){$("shAboutT").textContent=T.shAboutT;$("aboutBody").textContent=T.about;}
 if(id==="contact"){$("shContactT").textContent=T.shContactT;$("contactBody").innerHTML=T.contact.map(c=>`<div class="cityrow" onclick="toast('${c[2]}')"><svg class="ic" style="color:var(--acc)"><use href="#${c[0]}"/></svg><div><b>${c[1]}</b><small>${c[2]}</small></div></div>`).join("");}
}
function pickCity(k,soon){if(soon){toast(T.cityToast);return}city=k;closeSheet("city")}
/* core */
function renderAll(){renderToday();renderExplore();renderAsk();renderTrip();renderSaved();renderSettings()}
function setLang(l){lang=l;T=STR[l];const ph=$("phone");ph.setAttribute("dir",l==="ar"?"rtl":"ltr");ph.classList.toggle("rtl",l==="ar");
 $("ob2T").textContent=T.ob2T;$("ob2S").textContent=T.ob2S;$("ob2B").textContent=T.ob2B;
 renderAll();const act=document.querySelector(".screen.active");if(act&&act.id==="detail")openPlace(cur);if(act&&act.id==="follow")renderFollow();}
function swap(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");
 if(["today","explore","ask","trip","saved"].includes(id)){lastTab=id;renderAll()}if(id==="settings")renderSettings();
 const sc=document.querySelector("#"+id+" .scroll");if(sc)sc.scrollTop=0}
let tt;function toast(m){$("toasttxt").textContent=m;$("toast").classList.add("show");clearTimeout(tt);tt=setTimeout(()=>$("toast").classList.remove("show"),2100)}
setLang("en");
</script>
</body>
</html>
