<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atlas">
<meta name="theme-color" content="#171209">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Atlas — أطلس</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=El+Messiri:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600;700&family=Alexandria:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
 :root{
   --acc:#B85C38; --ok:#3E7D5C; --warn:#C15B4A;
   --ink:#241F17; --stone:#7A7160;
   --glass:rgba(253,250,242,.55); --glass2:rgba(253,250,242,.42);
   --gbord:rgba(255,255,255,.68);
   --disp:"Playfair Display",Georgia,serif; --ui:"Hanken Grotesk",-apple-system,sans-serif;
   --ease:cubic-bezier(.32,.72,.24,1);
 }
 .rtl{--disp:"El Messiri","IBM Plex Sans Arabic",sans-serif;--ui:"IBM Plex Sans Arabic",-apple-system,sans-serif}
 *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
 html,body{height:100%}
 body{background:#171209;font-family:"Hanken Grotesk",sans-serif;color:var(--ink);overscroll-behavior:none}
 .phone{width:100%;height:100dvh;overflow:hidden;position:relative;font-family:var(--ui);color:var(--ink)}
 .atmo{position:absolute;inset:0;background:
   radial-gradient(110% 60% at 80% 0%, rgba(248,211,158,.95), rgba(248,211,158,0) 52%),
   radial-gradient(130% 90% at 10% 100%, rgba(103,133,116,.5), rgba(103,133,116,0) 62%),
   linear-gradient(170deg,#F0E4CE 0%,#EBD6B4 32%,#DDBE94 58%,#C0AB8C 80%,#A5A08C 100%)}
 .atmo .dune{position:absolute;left:-10%;right:-10%;height:34%;filter:blur(28px);opacity:.55;border-radius:50%}
 .atmo .d1{bottom:20%;background:#CE9B62}
 .atmo .d2{bottom:2%;background:#7E8E76;height:30%}
 .atmo .grainy{position:absolute;inset:0;opacity:.5}

 .screen{position:absolute;inset:0;display:none;flex-direction:column}
 .screen.active{display:flex;animation:fade .32s ease}
 @keyframes fade{from{opacity:.5}to{opacity:1}}
 .scroll{flex:1;overflow-y:auto;padding-bottom:210px}
 .scroll::-webkit-scrollbar{display:none}
 .status{height:calc(env(safe-area-inset-top,14px) + 8px);flex-shrink:0}
 .status *{display:none}

 .ic{width:20px;height:20px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
 .ic.s{width:15px;height:15px}
 .rtl .flip{transform:scaleX(-1)}
 .glass{background:var(--glass);backdrop-filter:blur(22px);border:1px solid var(--gbord);box-shadow:0 14px 34px rgba(60,44,20,.13), inset 0 1px 0 rgba(255,255,255,.7);border-radius:34px}

 .toprow{padding:6px 26px 0;display:flex;align-items:center;justify-content:space-between}
 .toprow .who small{font-size:11.5px;color:var(--stone);display:block}
 .toprow .who b{font-family:var(--disp);font-weight:500;font-size:20px;letter-spacing:-.2px}
 .langsw{display:flex;background:var(--glass2);backdrop-filter:blur(14px);border:1px solid var(--gbord);border-radius:999px;overflow:hidden;font-size:10.5px;font-weight:600}
 .langsw div{padding:6px 12px;cursor:pointer;color:var(--stone)}
 .langsw div.on{background:var(--ink);color:#F5EFE2}

 .tiles{display:flex;gap:12px;padding:18px 24px 0}
 .tile{flex:1;padding:18px 10px 15px;text-align:center;cursor:pointer;transition:transform .25s var(--ease)}
 .tile:hover{transform:translateY(-3px)}
 .tile svg.spark{width:74px;height:26px;margin:0 auto 10px;display:block;stroke:var(--ink);fill:none;stroke-width:1.6}
 .tile svg.spark circle{fill:#FBF6EC;stroke:var(--ink)}
 .tile svg.spark circle.end{fill:var(--ink)}
 .tile .num{font-family:var(--disp);font-weight:400;font-size:31px;letter-spacing:-.5px;line-height:1}
 .tile .num small{font-size:12px;color:var(--stone);margin-inline-start:2px}
 .tile .lbl{font-size:11px;font-weight:500;color:var(--stone);margin-top:7px}

 .insight{margin:16px 24px 0;padding:26px 26px 24px;text-align:center;cursor:pointer}
 .insight .k{font-size:12.5px;font-weight:500;opacity:.75}
 .insight p{font-family:var(--disp);font-weight:400;font-size:24px;line-height:1.32;letter-spacing:-.2px;margin-top:10px}
 .rtl .insight p{font-size:17px;line-height:1.7;font-weight:500}
 .insight .go{width:52px;height:52px;border-radius:50%;background:var(--ink);color:#F5EFE2;display:flex;align-items:center;justify-content:center;margin:20px auto 0;transition:transform .2s}
 .insight:hover .go{transform:scale(1.06)}

 .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 24px 0}
 .ptile{padding:9px 9px 4px;cursor:pointer;border-radius:28px;transition:transform .25s var(--ease)}
 .ptile:hover{transform:translateY(-3px)}
 .ptile .thumb{height:86px;border-radius:20px;overflow:hidden}
 .ptile .thumb svg{width:100%;height:100%;display:block}
 .ptile b{font-family:var(--disp);font-weight:500;font-size:14.5px;letter-spacing:-.1px;display:block;margin:10px 6px 0;line-height:1.2}
 .rtl .ptile b{font-weight:500;font-size:12px}
 .ptile small{font-size:10.5px;color:var(--stone);display:block;margin:3px 6px 0}
 .ptile .st{font-size:10.5px;font-weight:700;display:block;margin:5px 6px 10px}
 .st-ok{color:var(--ok)} .st-warn{color:var(--warn)} .st-mut{color:var(--stone)}

 .shead{padding:8px 26px 0}
 .shead h1{font-family:var(--disp);font-weight:500;font-size:30px;letter-spacing:-.3px}
 .rtl .shead h1{font-weight:500;font-size:20px}
 .searchp{margin:14px 24px 0;height:48px;border-radius:999px;display:flex;align-items:center;gap:10px;padding:0 18px;color:var(--stone);font-size:13px;cursor:text}
 .chips{display:flex;gap:8px;overflow-x:auto;padding:14px 24px 0}
 .chips::-webkit-scrollbar{display:none}
 .chip{white-space:nowrap;padding:9px 15px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;color:var(--stone);background:var(--glass2);backdrop-filter:blur(12px);border:1px solid var(--gbord);transition:all .2s}
 .chip.on{background:var(--ink);color:#F5EFE2;border-color:var(--ink)}

 .dheadwrap{padding:4px 26px 0}
 .dhead .kick{font-size:10.5px;font-weight:600;letter-spacing:2.4px;color:var(--stone)}
 .rtl .dhead .kick{letter-spacing:0;font-size:12px}
 .dhead h1{font-family:var(--disp);font-weight:400;font-size:38px;letter-spacing:-.5px;line-height:1.05;margin-top:6px;text-wrap:balance}
 .rtl .dhead h1{font-weight:500;font-size:23px;line-height:1.45}
 .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 24px 0}
 .dcell{padding:18px 14px 16px;text-align:center}
 .dcell .chipb{display:inline-block;background:rgba(253,250,242,.82);border:1px solid var(--gbord);border-radius:999px;font-size:10.5px;font-weight:600;padding:4px 12px}
 .dcell .num{font-family:var(--disp);font-weight:400;font-size:29px;letter-spacing:-.4px;margin-top:10px}
 .dcell .state{font-size:11px;font-weight:600;margin-top:6px}
 .dstoryc{margin:16px 24px 0;padding:24px 26px;text-align:center}
 .dstoryc .k{font-size:12px;font-weight:500;opacity:.72}
 .dstoryc p{font-family:var(--disp);font-weight:400;font-size:19.5px;line-height:1.5;margin-top:9px}
 .rtl .dstoryc p{font-family:"IBM Plex Sans Arabic",sans-serif;font-weight:400;font-size:15px;line-height:1.95}
 .dcta{margin:16px 24px 0;padding:9px 9px 9px 24px;display:flex;align-items:center;border-radius:999px;cursor:pointer}
 .rtl .dcta{padding:9px 24px 9px 9px}
 .dcta b{font-size:14px;font-weight:600}
 .dcta small{font-size:11px;color:var(--stone);display:block;margin-top:1px}
 .dcta .btn{margin-inline-start:auto;background:var(--ink);color:#F5EFE2;border-radius:999px;padding:14px 24px;font-size:13px;font-weight:600}
 .gbtnrow{padding:8px 20px 0;display:flex;justify-content:space-between}
 .gbtn{width:42px;height:42px;border-radius:50%;background:var(--glass2);backdrop-filter:blur(14px);border:1px solid var(--gbord);display:flex;align-items:center;justify-content:center;cursor:pointer}
 .gbtn.on{color:var(--acc)}

 /* routes */
 .rcard{margin:16px 24px 0;padding:20px 22px;cursor:pointer}
 .rcard .toprow2{display:flex;align-items:baseline;justify-content:space-between}
 .rcard b.nm{font-family:var(--disp);font-weight:500;font-size:19px;letter-spacing:-.2px}
 .rtl .rcard b.nm{font-weight:500;font-size:15.5px}
 .rcard .tag{font-size:10px;font-weight:700;border-radius:999px;padding:4px 11px;background:rgba(253,250,242,.85);border:1px solid var(--gbord)}
 .rcard .tag.gold{color:#8A5E14}
 .rcard .meta2{font-size:11.5px;color:var(--stone);margin-top:5px}
 .tl{margin-top:16px;border-top:1px solid rgba(120,100,70,.16);padding-top:14px}
 .tstop{display:flex;gap:13px}
 .tstop .rail{display:flex;flex-direction:column;align-items:center}
 .tnum{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#F5EFE2;font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
 .tline{width:2px;flex:1;border-inline-start:2px dotted rgba(120,100,70,.35);min-height:22px}
 .tinfo{padding-bottom:14px}
 .tinfo b{font-size:13.5px;font-weight:600;display:block}
 .tinfo small{font-size:11px;color:var(--stone)}
 .drivec{display:inline-block;font-size:10px;color:var(--ok);font-weight:700;margin-top:3px}

 /* chat */
 .chead{display:flex;align-items:center;gap:12px;padding:8px 24px 0}
 .chead .ava{width:44px;height:44px;border-radius:50%;background:var(--ink);color:#F0C98C;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:19px}
 .chead b{font-size:15px;font-weight:600;display:block}
 .chead small{font-size:11px;color:var(--ok);font-weight:600}
 .msgs{padding:18px 24px 0;display:flex;flex-direction:column;gap:12px}
 .msg{max-width:78%;padding:13px 17px;font-size:13.5px;line-height:1.6;border-radius:24px}
 .msg.bot{align-self:flex-start;border-start-start-radius:8px}
 .msg.me{align-self:flex-end;background:var(--ink);color:#F5EFE2;border-start-end-radius:8px;border-radius:24px;border-start-end-radius:8px}
 .msg .cite{display:block;font-size:10.5px;color:var(--stone);margin-top:7px}
 .msg.me .cite{color:#C9BFA8}
 .inputbar{margin:16px 24px 0;height:52px;border-radius:999px;display:flex;align-items:center;gap:10px;padding:0 8px 0 20px;color:var(--stone);font-size:13px}
 .rtl .inputbar{padding:0 20px 0 8px}
 .inputbar .send{margin-inline-start:auto;width:38px;height:38px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center}

 /* nav */
 .navfade{position:absolute;bottom:0;left:0;right:0;height:130px;background:linear-gradient(transparent,rgba(196,178,146,.92) 78%);z-index:35;pointer-events:none}
 .navwrap{position:absolute;bottom:calc(env(safe-area-inset-bottom,16px) + 12px);left:24px;right:24px;display:flex;justify-content:space-between;align-items:center;z-index:40}
 .pillnav{display:flex;gap:2px;padding:7px;border-radius:999px}
 .nitem{display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:999px;padding:8px 13px;cursor:pointer;color:var(--stone);font-size:9.5px;font-weight:600;transition:all .25s}
 .nitem .nic{width:28px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center}
 .nitem.on{background:rgba(253,250,242,.88)}
 .nitem.on .nic{background:var(--acc);color:#fff}
 .nitem.on span{color:var(--acc)}
 .chatb{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
 .chatb:hover{transform:scale(1.06)}

 /* onboarding */
 .ob{justify-content:flex-end;padding:0;cursor:default}
 .obscene{position:absolute;inset:0;z-index:1}
 .obveil{position:absolute;inset:0;background:linear-gradient(rgba(240,228,206,0) 30%,rgba(240,228,206,.55) 62%,rgba(238,224,198,.96) 82%)}
 .ob .obinner{position:relative;z-index:3;padding:0 26px 46px}
 .ob .brandmark{font-family:"Alexandria",sans-serif;font-weight:700;font-size:46px;color:var(--ink);letter-spacing:-.5px;line-height:1}
 .ob .brandsub{font-size:11px;font-weight:700;letter-spacing:6px;color:var(--stone);margin-top:6px}
 .ob .arline{font-family:"IBM Plex Sans Arabic",sans-serif}
 .obfloat{position:absolute;z-index:2;inset-inline-start:34px;top:120px;width:210px;border-radius:26px;padding:14px 16px;animation:obdrift 5s ease-in-out infinite alternate}
 @keyframes obdrift{from{transform:translateY(0) rotate(-1.5deg)}to{transform:translateY(-14px) rotate(1deg)}}
 .obfloat .k2{font-size:10px;font-weight:700;letter-spacing:1.8px;color:var(--stone)}
 .obfloat p{font-family:var(--disp);font-size:16.5px;line-height:1.4;margin-top:6px}
 .rtl .obfloat p{font-size:15px;line-height:1.7}
 .obmosaic{position:absolute;z-index:2;top:96px;inset-inline-start:24px;inset-inline-end:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
 .obmosaic .m{border-radius:20px;overflow:hidden;height:86px;position:relative;box-shadow:0 10px 26px rgba(60,44,20,.18)}
 .obmosaic .m svg{width:100%;height:100%;display:block}
 .obmosaic .m span{position:absolute;bottom:6px;inset-inline-start:9px;color:#fff;font-size:10px;font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.5)}
 .obmosaic .m.soon::after{content:"";position:absolute;inset:0;background:rgba(238,224,198,.45)}
 .obmosaic .m:nth-child(2){transform:translateY(16px)}
 .obmosaic .m:nth-child(5){transform:translateY(16px)}
 .ob h1{font-family:var(--disp);font-weight:400;font-size:34px;letter-spacing:-.4px;line-height:1.14;margin-top:14px;text-wrap:balance}
 .rtl .ob h1{font-weight:500;font-size:22px;line-height:1.55}
 .ob .sub{font-size:14px;color:var(--stone);margin-top:12px;line-height:1.6;max-width:300px}
 .ob .langbtns{display:flex;gap:10px;margin-top:26px}
 .obbtn{flex:1;padding:16px;border-radius:999px;text-align:center;font-size:14.5px;font-weight:600;cursor:pointer;transition:transform .2s}
 .obbtn:hover{transform:translateY(-2px)}
 .obbtn.dark{background:var(--ink);color:#F5EFE2}
 .obbtn .arf{font-family:"IBM Plex Sans Arabic",sans-serif;font-size:15.5px}
 .obskip{text-align:center;margin-top:16px;font-size:12px;font-weight:600;color:var(--stone);cursor:pointer}
 .obdots{display:flex;gap:6px;margin-top:26px}
 .obdots i{width:6px;height:6px;border-radius:3px;background:rgba(36,31,23,.25);transition:all .3s}
 .obdots i.on{width:18px;background:var(--ink)}
 .citypick{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-height:400px;overflow-y:auto;padding-bottom:4px}
 .citypick::-webkit-scrollbar{display:none}
 .ccard{padding:9px 9px 4px;border-radius:26px;cursor:pointer;transition:transform .22s var(--ease);position:relative}
 .ccard:hover{transform:translateY(-3px)}
 .ccard .thumb{height:74px;border-radius:18px;overflow:hidden}
 .ccard .thumb svg{width:100%;height:100%;display:block}
 .ccard b{font-family:var(--disp);font-weight:500;font-size:14px;display:block;margin:9px 6px 0}
 .rtl .ccard b{font-weight:500;font-size:12px}
 .ccard small{font-size:10px;color:var(--stone);display:block;margin:2px 6px 9px}
 .ccard .soon{position:absolute;top:16px;inset-inline-end:16px;background:rgba(253,250,242,.9);border-radius:999px;font-size:9px;font-weight:700;padding:3px 9px;color:var(--stone)}
 .ccard.sel{outline:2px solid var(--acc);outline-offset:2px}

 /* rtl numeral & label refinements */
 .rtl .tile .num{font-size:23px;font-weight:500}
 .rtl .tile .lbl{font-size:10.5px}
 .rtl .dcell .num{font-size:20px;font-weight:500;margin-top:8px}
 .rtl .dcell .chipb{font-size:10px}
 .rtl .dcell .state{font-size:10.5px}
 .rtl .toprow .who b{font-size:17px}
 .rtl .dstoryc p{font-size:14px}
 .rtl .msg{font-size:13px;line-height:1.75}
 /* exploration home */
 .bigask{font-family:var(--disp);font-weight:400;font-size:34px;letter-spacing:-.4px;line-height:1.14;padding:16px 26px 0;text-wrap:balance}
 .rtl .bigask{font-weight:500;font-size:22px;line-height:1.55}
 .ctabs{display:flex;gap:22px;padding:12px 28px 2px;overflow-x:auto}
 .ctabs::-webkit-scrollbar{display:none}
 .ctab{white-space:nowrap;font-size:13.5px;font-weight:600;color:var(--stone);cursor:pointer;padding-bottom:8px;border-bottom:2px solid transparent;transition:all .25s}
 .ctab.on{color:var(--ink);border-bottom-color:var(--acc)}
 .rtl .ctab{font-size:13px}
 .citygrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 24px 0}
 .citycard{padding:9px 9px 4px;border-radius:28px;cursor:pointer;transition:transform .25s var(--ease);position:relative}
 .citycard:hover{transform:translateY(-3px)}
 .citycard .thumb{height:96px;border-radius:20px;overflow:hidden;position:relative}
 .citycard .thumb svg{width:100%;height:100%;display:block}
 .citycard.dim .thumb::after{content:"";position:absolute;inset:0;background:rgba(240,228,206,.42)}
 .citycard b{font-family:var(--disp);font-weight:500;font-size:15px;display:block;margin:10px 6px 0}
 .rtl .citycard b{font-size:13.5px}
 .citycard small{font-size:10.5px;color:var(--stone);display:block;margin:3px 6px 10px}
 .citycard .dot{position:absolute;top:17px;inset-inline-start:17px;display:flex;gap:6px;align-items:center;background:rgba(20,14,6,.4);backdrop-filter:blur(8px);border-radius:999px;font-size:9px;font-weight:700;padding:4px 10px;color:#fff}
 .citycard .dot i{width:5px;height:5px;border-radius:50%;background:#7FC69B}
 .citycard .soonb{position:absolute;top:17px;inset-inline-end:17px;background:rgba(253,250,242,.92);border-radius:999px;font-size:9px;font-weight:700;padding:4px 10px;color:var(--stone)}
 .cempty{grid-column:1/-1;padding:30px 24px;text-align:center}
 .cempty p{font-family:var(--disp);font-size:17px;line-height:1.55;color:#4A4438}
 .rtl .cempty p{font-size:15px;line-height:1.8}
 .cempty small{display:block;font-size:11.5px;color:var(--stone);margin-top:10px}
 .dest{min-width:262px;scroll-snap-align:start;border-radius:32px;overflow:hidden;position:relative;height:330px;cursor:pointer;box-shadow:0 18px 44px rgba(60,44,20,.2);transition:transform .3s var(--ease)}
 .dest:hover{transform:translateY(-4px)}
 .dest svg.bg{position:absolute;inset:0;width:100%;height:100%}
 .dest .veil{position:absolute;inset:0;background:linear-gradient(rgba(20,14,6,.05) 40%,rgba(20,14,6,.68))}
 .dest .body3{position:absolute;bottom:0;left:0;right:0;padding:20px;color:#fff}
 .dest .body3 .cn{font-family:var(--disp);font-weight:500;font-size:26px;letter-spacing:-.3px}
 .rtl .dest .body3 .cn{font-weight:500;font-size:17px}
 .dest .body3 .cs{font-size:11.5px;opacity:.85;margin-top:3px}
 .dest .body3 .cta3{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:rgba(253,250,242,.92);color:var(--ink);border-radius:999px;padding:9px 16px;font-size:12px;font-weight:700}
 .dest .soon3{position:absolute;top:16px;inset-inline-end:16px;background:rgba(253,250,242,.92);border-radius:999px;font-size:10px;font-weight:700;padding:5px 12px;color:var(--stone)}
 .dest .live3{position:absolute;top:16px;inset-inline-start:16px;display:flex;gap:6px;align-items:center;background:rgba(20,14,6,.4);backdrop-filter:blur(8px);border-radius:999px;font-size:10px;font-weight:700;padding:5px 12px;color:#fff}
 .dest .live3 i{width:6px;height:6px;border-radius:50%;background:#7FC69B}
 .dest.soonc{filter:saturate(.75)}
 .cityhero{margin:16px 24px 0;padding:22px 24px 20px;cursor:pointer;position:relative;overflow:hidden}
 .cityhero .kick{font-size:10px;font-weight:700;letter-spacing:2.2px;color:var(--stone);display:block;padding-inline-end:58px}
 .rtl .cityhero .kick{letter-spacing:0;font-size:11.5px}
 .cityhero h2{font-family:var(--disp);font-weight:400;font-size:34px;letter-spacing:-.4px;margin-top:4px}
 .rtl .cityhero h2{font-weight:600;font-size:30px}
 .cityhero .sub2{font-size:12px;color:var(--stone);margin-top:3px}
 .cityhero .vitals{display:flex;gap:18px;margin-top:16px}

 .cpill.on{background:var(--ink);color:#F5EFE2;border-color:var(--ink)}
 .cpill .flag{font-size:13px}

 .toast{position:absolute;bottom:110px;left:0;right:0;display:flex;justify-content:center;z-index:60;pointer-events:none}
 .toast span{background:rgba(36,31,23,.92);backdrop-filter:blur(8px);color:#F5EFE2;font-size:12px;font-weight:500;border-radius:999px;padding:10px 18px;opacity:0;transform:translateY(8px);transition:all .3s var(--ease)}
 .toast.show span{opacity:1;transform:none}

let lang="en",T=STR.en,curPlace="qarah",xFilter="all",lastList="home";
function navHTML(active){
 return T.nav.map((lbl,i)=>{
  const id=["home","explore","routes"][i];
  return `<div class="nitem ${active===id?"on":""}" onclick="swap('${id}')">
    <div class="nic"><svg class="ic s"><use href="#i-${["home","compass","route"][i]}"/></svg></div><span>${lbl}</span></div>`;
 }).join("");
}
function renderNavs(active){
 ({home:"navHome",explore:"navExplore",routes:"navRoutes",detail:"navDetail"});
 document.getElementById("navHome").innerHTML=navHTML("home");
 document.getElementById("navExplore").innerHTML=navHTML("explore");
 document.getElementById("navRoutes").innerHTML=navHTML("routes");
 document.getElementById("navDetail").innerHTML=navHTML("explore");
}
function tileHTML(p){
 return `<div class="ptile glass" onclick="openPlace('${p[0]}')">
   <div class="thumb"><svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice"><use href="#${p[1]}"/></svg></div>
   <b>${p[2]}</b><small>${p[3]}</small><span class="st st-${p[5]}">${p[4]}</span></div>`;
}
let curCountry="sa";
function cityCard(c){
 const soon=c[4];
 return `<div class="citycard glass ${soon?"dim":""}" onclick="${soon?"toast(T.soonToast)":"swap('explore')"}">
   <div class="thumb"><svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice"><use href="#${c[1]}"/></svg></div>
   ${soon?`<span class="soonb">${lang==="ar"?"قريباً":"SOON"}</span>`:`<span class="dot"><i></i>${lang==="ar"?"متاحة":"LIVE"}</span>`}
   <b>${c[2]}</b><small>${c[3]}</small></div>`;
}
function renderDest(){
 document.getElementById("countryRow").innerHTML=T.countries.map(c=>
  `<div class="ctab ${curCountry===c[0]?"on":""}" onclick="curCountry='${c[0]}';renderDest()">${c[1]}</div>`).join("");
 const cities=T.citiesBy[curCountry];
 document.getElementById("destCar").innerHTML=cities.length?cities.map(cityCard).join(""):
  `<div class="cempty glass"><p>${T.cempty[0]}</p><small>${T.cempty[1]}</small></div>`;
}

function renderRoutes(){

function openPlace(k){
 if(!PL[k]){toast(lang==="ar"?"الصفحة الكاملة مع الدليل الكامل":"Full page ships with the full catalog");return}
 lastList=document.querySelector(".screen.active").id;if(lastList==="detail")lastList="home";
 curPlace=k;const L=PL[k][lang];
 document.getElementById("dKick").textContent=L.kick;
 document.getElementById("dTitle").textContent=L.title;
 document.getElementById("dGrid").innerHTML=L.grid.map(g=>`<div class="dcell glass"><span class="chipb">${g[0]}</span><div class="num">${g[1]}</div><div class="state st-${g[3]}">${g[2]}</div></div>`).join("");
 document.getElementById("dSk").textContent=L.sk;
 document.getElementById("dStory").textContent=L.story;
 document.getElementById("dCtaT").textContent=L.ctaT;
 document.getElementById("dCtaS").textContent=L.ctaS;
 document.getElementById("dCtaB").textContent=L.ctaB;
 swap("detail");
}
function renderAll(){renderNavs();renderHome();renderExplore();renderRoutes();renderChat()}
function setLang(l){
 lang=l;T=STR[l];
 const ph=document.getElementById("phone");
 ph.setAttribute("dir",l==="ar"?"rtl":"ltr");
 ph.classList.toggle("rtl",l==="ar");
 document.getElementById("swEn").classList.toggle("on",l==="en");
 document.getElementById("swAr").classList.toggle("on",l==="ar");
 renderAll();
 if(document.getElementById("detail").classList.contains("active"))openPlace(curPlace);
}
function swap(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");
 const sc=document.querySelector("#"+id+" .scroll");if(sc)sc.scrollTop=0}
function saveTap(e,el){e.stopPropagation();el.classList.toggle("on")}
let tt;function toast(m){const t=document.getElementById("toast");document.getElementById("toasttxt").textContent=m;
 t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2100)}
renderAll();
